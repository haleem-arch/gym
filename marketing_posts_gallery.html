    const navContainer = document.getElementById("nav-list");
    
    function initApp() {
      posts.forEach((post, index) => {
        const item = document.createElement("div");
        item.className = `post-nav-item ${index === 0 ? 'active' : ''}`;
        item.onclick = () => selectPost(index);
        item.innerHTML = `
          <span class="tag" style="color: ${getTagColor(post.tag)}">${post.tag}</span>
          <span class="title">${post.title}</span>
        `;
        navContainer.appendChild(item);
      });

      // Load first post
      selectPost(0);
    }

    function getTagColor(tag) {
      if (tag.includes("Live Now")) return "#10b981";
      if (tag.includes("Teaser")) return "#f59e0b";
      if (tag.includes("Feature")) return "#3b82f6";
      return "#8b5cf6";
    }

    function selectPost(index) {
      // Toggle active states on side list
      const items = document.querySelectorAll(".post-nav-item");
      items.forEach((item, idx) => {
        if (idx === index) item.classList.add("active");
        else item.classList.remove("active");
      });

      const post = posts[index];
      
      // Update Instagram Simulated Image Canvas
      const postView = document.getElementById("post-view");
      postView.className = `ig-content-wrapper ${post.gradientClass}`;
      
      postView.innerHTML = `
        <div class="post-header">
          <div class="post-logo-row">
            <div class="post-logo-symbol">${logoSvg}</div>
            <div class="post-brand-name">Life Gym</div>
          </div>
          <div class="post-badge">${post.badge}</div>
        </div>

        <div class="post-main">
          <div class="post-tagline">${post.tagline}</div>
          <div class="post-headline">${post.headline}</div>
          <div class="post-description">${post.description}</div>
          
          <div class="feature-grid">
            ${post.features.map(feat => `
              <div class="feature-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                ${feat}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="post-footer">
          <div class="post-footer-handle">@lifegym.io</div>
          <div class="post-footer-action">
            ${post.footerAction}
            <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      `;

      // Update Info Panel details
      document.getElementById("panel-title").innerText = `${index + 1}. ${post.title}`;
      document.getElementById("panel-desc").innerText = post.detailsDesc;
      
      const captionText = document.getElementById("caption-text");
      captionText.innerText = post.caption;
    }

    function copyCaption() {
      const captionText = document.getElementById("caption-text").innerText;
      navigator.clipboard.writeText(captionText).then(() => {
        alert("Caption copied successfully to clipboard!");
      }).catch(err => {
        console.error("Could not copy text: ", err);
      });
    }

    // Run Initialization
    initApp();
  </script>
</body>
</html>
