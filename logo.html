<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Gym - SVG Logo</title>
  <style>
    body {
      background-color: #05060f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }
    
    .logo-container {
      width: 280px;
      height: 280px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin-top: 24px;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    p {
      color: #60a5fa;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      margin: 8px 0 0 0;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="width: 100%; height: 100%; image-rendering: crisp-edges;">
      <g transform="translate(256 256) rotate(-45)">
        <!-- Dumbbell Bar (Rod) -->
        <rect x="-120" y="-16" width="240" height="32" rx="8" fill="#1f2937" />
        
        <!-- Left Weights -->
        <rect x="-110" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
        <rect x="-150" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
        <rect x="-170" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
        
        <!-- Right Weights -->
        <rect x="80" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
        <rect x="120" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
        <rect x="160" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
      </g>
    </svg>
  </div>

  <h1>Life Gym</h1>
  <p>Premium Fitness Portal</p>

</body>
</html>
