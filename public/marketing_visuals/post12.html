<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 12 - Sync Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info { max-width:800px; text-align:center; margin:0 auto; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; }
    .info h1 span { color:#3b82f6; }
    
    .sync-flow { display:flex; justify-content:center; align-items:center; gap:50px; margin:auto 0; }
    .flow-node { width:220px; height:220px; border-radius:24px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
    .flow-node.highlight { border-color:#3b82f6; background:rgba(59,130,246,0.02); }
    .node-title { color:#fff; font-weight:700; font-size:1.3rem; margin-bottom:10px; }
    .node-desc { color:#9ca3af; font-size:0.9rem; }
    
    .flow-arrow { font-size:3rem; color:#3b82f6; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity:0.3; } 50% { opacity:1; } 100% { opacity:0.3; } }
    
    .footer { display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Real-time database <span>synchronization.</span></h1>
    </div>
    
    <div class="sync-flow">
      <div class="flow-node">
        <div class="node-title">Coach App</div>
        <div class="node-desc">Assign splits, templates & targets</div>
      </div>
      <div class="flow-arrow">⇄</div>
      <div class="flow-node highlight">
        <div class="node-title">Supabase DB</div>
        <div class="node-desc">Real-time WebSocket cloud layer</div>
      </div>
      <div class="flow-arrow">⇄</div>
      <div class="flow-node">
        <div class="node-title">Athlete App</div>
        <div class="node-desc">Log weight, diet, water & sets</div>
      </div>
    </div>
    
    <div class="footer">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
