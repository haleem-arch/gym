<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 6 - Telegram Webhook</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info { max-width:800px; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:15px; }
    .info h1 span { color:#3b82f6; }
    
    /* Telegram popup Mockup */
    .tg-popup { border-radius:24px; border:1px solid rgba(59,130,246,0.15); background:#111827; padding:35px; max-width:700px; margin:auto; box-shadow:0 20px 40px rgba(0,0,0,0.5); }
    .tg-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .tg-sender { display:flex; align-items:center; gap:12px; }
    .tg-avatar { width:45px; height:45px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold; }
    .tg-name { color:#fff; font-weight:700; font-size:1.1rem; }
    .tg-time { color:#6b7280; font-size:0.9rem; }
    .tg-body { color:#d1d5db; font-size:1.1rem; line-height:1.5; margin-bottom:25px; border-left:3px solid #3b82f6; padding-left:15px; }
    .tg-actions { display:grid; grid-template-columns: 1fr 1fr; gap:15px; }
    .btn { text-align:center; padding:12px 0; border-radius:12px; font-weight:700; font-size:1rem; cursor:pointer; border:none; }
    .btn.approve { background:#10b981; color:#fff; }
    .btn.reject { background:#ef4444; color:#fff; }
    
    .footer { display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Verify subscription receipts in <span>one click.</span></h1>
    </div>
    
    <div class="tg-popup">
      <div class="tg-header">
        <div class="tg-sender">
          <div class="tg-avatar">LG</div>
          <div>
            <div class="tg-name">Life Gym Admin Bot</div>
            <div style="color:#6b7280; font-size:0.8rem;">Telegram Webhook notification</div>
          </div>
        </div>
        <div class="tg-time">Just Now</div>
      </div>
      <div class="tg-body">
        <strong>New Payment Receipt Uploaded!</strong><br>
        Coach: Capt. Ahmed Amin<br>
        Plan: 3 Months Subscription (8,500 EGP)<br>
        Transaction: Vodafone Cash
      </div>
      <div class="tg-actions">
        <button class="btn approve">Approve ✅</button>
        <button class="btn reject">Reject ❌</button>
      </div>
    </div>
    
    <div class="footer">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
