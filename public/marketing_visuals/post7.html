<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 7 - Segmental Body Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Silhouette Map Mockup */
    .silhouette-mockup { z-index:10; width: 400px; height: 500px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); backdrop-filter:blur(10px); padding:40px; display:flex; flex-direction:column; justify-content:space-between; align-items:center; }
    .silhouette-svg { width: 100%; height: 350px; }
    .body-part { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.15); stroke-width: 1.5; }
    .body-part.highlighted { fill: rgba(59, 130, 246, 0.4); stroke: #3b82f6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Visual body segments. <span>Interactive.</span></h1>
      <p>Show client muscle-to-fat distributions using an interactive body silhouette segment map. Visually highlight target areas instantly.</p>
    </div>
    
    <div class="silhouette-mockup">
      <!-- Simulated Body Map SVG -->
      <svg class="silhouette-svg" viewBox="0 0 100 200">
        <!-- Head -->
        <circle class="body-part" cx="50" cy="20" r="12" />
        <!-- Torso -->
        <path class="body-part highlighted" d="M35,38 L65,38 L60,110 L40,110 Z" />
        <!-- Left Arm -->
        <path class="body-part" d="M32,38 L15,85 L22,88 L35,50 Z" />
        <!-- Right Arm -->
        <path class="body-part" d="M68,38 L85,85 L78,88 L65,50 Z" />
        <!-- Left Leg -->
        <path class="body-part highlighted" d="M40,112 L30,190 L40,190 L48,125 Z" />
        <!-- Right Leg -->
        <path class="body-part" d="M60,112 L70,190 L60,190 L52,125 Z" />
      </svg>
      <div style="color:#fff; font-weight:700; font-size:1.1rem; text-align:center;">
        Trunk Muscle: <span style="color:#3b82f6;">+1.2kg (High)</span>
      </div>
    </div>
  </div>
</body>
</html>
