<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 3 - Desktop Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info { max-width:750px; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:15px; }
    .info h1 span { color:#3b82f6; }
    
    /* Desktop Console CSS */
    .desktop-mockup { width: 100%; height: 480px; border: 8px solid #1e293b; border-radius: 20px; background:#0b0f19; box-shadow: 0 25px 50px rgba(0,0,0,0.8); display:flex; overflow:hidden; }
    .sidebar { width: 20%; background:#090d16; border-right:1px solid rgba(255,255,255,0.05); padding:20px; display:flex; flex-direction:column; gap:15px; }
    .sidebar-item { height: 12px; background:rgba(255,255,255,0.1); border-radius:4px; }
    .sidebar-item.active { background:#3b82f6; }
    
    .panel-main { flex:1; padding:30px; display:grid; grid-template-columns: 2fr 1fr; gap:20px; }
    .chart-box { border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); border-radius:16px; padding:20px; display:flex; flex-direction:column; justify-content:space-between; }
    .chart-line { width: 100%; height: 120px; border-bottom: 2px solid rgba(255,255,255,0.1); border-left: 2px solid rgba(255,255,255,0.1); position:relative; overflow:hidden; }
    .chart-svg { width:100%; height:100%; stroke:#3b82f6; fill:none; stroke-width:3; }
    
    .details-box { border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); border-radius:16px; padding:20px; }
    .details-line { height: 10px; background:rgba(255,255,255,0.05); border-radius:4px; margin-bottom:12px; }
    
    .footer { display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>The 3-Pane Coach <span>Control Center.</span></h1>
    </div>
    
    <div class="desktop-mockup">
      <div class="sidebar">
        <div class="sidebar-item active" style="width:60%;"></div>
        <div class="sidebar-item" style="width:80%;"></div>
        <div class="sidebar-item" style="width:50%;"></div>
      </div>
      <div class="panel-main">
        <div class="chart-box">
          <div style="color:#fff; font-weight:700; font-size:1.1rem;">Biometrics & Muscle Analysis</div>
          <div class="chart-line">
            <svg class="chart-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
              <path d="M 0,80 Q 25,20 50,60 T 100,10" />
            </svg>
          </div>
        </div>
        <div class="details-box">
          <div style="color:#10b981; font-weight:700; font-size:0.9rem; margin-bottom:15px;">Active Client</div>
          <div class="details-line" style="width:70%;"></div>
          <div class="details-line" style="width:90%;"></div>
          <div class="details-line" style="width:50%;"></div>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
