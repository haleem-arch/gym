<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 13 - Coach Testimonial</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .quote-box { background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.05); border-radius:32px; padding:60px; max-width:850px; margin:auto; position:relative; }
    .quote-mark { position:absolute; top:-30px; left:40px; font-size:8rem; color:rgba(59,130,246,0.15); font-family:serif; line-height:1; }
    
    .quote-text { font-size:2.2rem; font-weight:400; color:#f3f4f6; line-height:1.5; margin-bottom:40px; z-index:10; position:relative; }
    .quote-author { display:flex; align-items:center; gap:20px; }
    .author-img { width:65px; height:65px; border-radius:50%; background:#1e293b; }
    .author-name { color:#fff; font-weight:700; font-size:1.3rem; }
    .author-role { color:#6b7280; font-size:1rem; margin-top:4px; }
    
    .footer { display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="quote-box">
      <div class="quote-mark">“</div>
      <div class="quote-text">
        "I was managing 15 athletes on WhatsApp and it felt like a nightmare. Since switching to Life Gym, I onboarded 50 clients and save 15 hours a week of manual admin work."
      </div>
      <div class="quote-author">
        <div class="author-img"></div>
        <div>
          <div class="author-name">Coach Jimmy</div>
          <div class="author-role">Elite Personal Trainer</div>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
