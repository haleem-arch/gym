<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 21 - Strava Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#fc5200; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Strava Mockup */
    .strava-card { z-index:10; width: 400px; border-radius: 24px; border: 1px solid rgba(252,82,0,0.3); background:rgba(252,82,0,0.02); padding:35px; }
    .strava-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .strava-title { color:#fc5200; font-weight:900; font-size:1.2rem; }
    .strava-map { width:100%; height:150px; background:#111827; border-radius:12px; border:1px solid rgba(255,255,255,0.05); position:relative; overflow:hidden; }
    .map-line { width:100%; height:100%; stroke:#fc5200; fill:none; stroke-width:3; stroke-linecap:round; }
    .strava-stats { display:flex; justify-content:space-between; margin-top:20px; }
    .stat-item { text-align:center; }
    .stat-val { color:#fff; font-weight:700; font-size:1.2rem; }
    .stat-label { color:#9ca3af; font-size:0.8rem; margin-top:4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Cardio activity <br>sync with <span>Strava.</span></h1>
      <p>Seamlessly import run splits, elevations, and GPS route polylines to track complete outdoor endurance metrics.</p>
    </div>
    
    <div class="strava-card">
      <div class="strava-header">
        <span class="strava-title">Morning Run</span>
        <span style="color:#6b7280; font-size:0.85rem;">Strava Sync</span>
      </div>
      <div class="strava-map">
        <svg class="map-line" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path d="M 10,80 C 30,70 40,20 60,30 S 80,90 90,10" />
        </svg>
      </div>
      <div class="strava-stats">
        <div class="stat-item"><div class="stat-val">5.2 km</div><div class="stat-label">Distance</div></div>
        <div class="stat-item"><div class="stat-val">24:15</div><div class="stat-label">Duration</div></div>
        <div class="stat-item"><div class="stat-val">4:40/km</div><div class="stat-label">Pace</div></div>
      </div>
    </div>
  </div>
</body>
</html>
