<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 5 - Hydration compliance</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-left { bottom:-100px; left:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Ring UI Mockup */
    .ring-mockup { z-index:10; width: 420px; height: 420px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); backdrop-filter:blur(10px); display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; }
    .svg-container { position:absolute; width:100%; height:100%; transform: rotate(-90deg); }
    .svg-ring-bg { fill:none; stroke:rgba(255,255,255,0.02); stroke-width:12; }
    .svg-ring-active { fill:none; stroke:#3b82f6; stroke-width:12; stroke-linecap:round; stroke-dasharray: 750; stroke-dashoffset: 250; }
    .ring-text { z-index:20; text-align:center; }
    .ring-text .val { font-size:4.5rem; font-weight:900; color:#fff; line-height:1; }
    .ring-text .sub { font-size:1.2rem; color:#9ca3af; margin-top:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-left"></div>
    <div class="info">
      <h1>Track hydration with <span>fluid status rings.</span></h1>
      <p>A concentric SVG progress ring system details water compliance alongside daily calories and completed gym sets in a single, beautiful dashboard.</p>
    </div>
    
    <div class="ring-mockup">
      <svg class="svg-container" viewBox="0 0 300 300">
        <circle class="svg-ring-bg" cx="150" cy="150" r="120" />
        <circle class="svg-ring-active" cx="150" cy="150" r="120" />
      </svg>
      <div class="ring-text">
        <div class="val">2.5L</div>
        <div class="sub">Water Logged</div>
        <div style="color:#10b981; font-weight:700; margin-top:10px; font-size:1.1rem;">Target: 3.5L</div>
      </div>
    </div>
  </div>
</body>
</html>
