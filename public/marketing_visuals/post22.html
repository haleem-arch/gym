<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 22 - Sleep Cycles</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(139,92,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-left { bottom:-100px; left:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#8b5cf6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Sleep Wave Mockup */
    .sleep-card { z-index:10; width: 400px; border-radius: 24px; border: 1px solid rgba(139,92,246,0.3); background:rgba(139,92,246,0.02); padding:35px; }
    .sleep-header { color:#8b5cf6; font-weight:900; font-size:1.2rem; margin-bottom:20px; }
    .sleep-graph { width:100%; height:120px; position:relative; }
    .sleep-svg { width:100%; height:100%; stroke:#8b5cf6; fill:none; stroke-width:2.5; }
    .sleep-total { text-align:center; margin-top:25px; }
    .sleep-val { font-size:2.8rem; font-weight:900; color:#fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-left"></div>
    <div class="info">
      <h1>Analyze client <span>sleep & recovery.</span></h1>
      <p>Review sleep phases (REM, light, deep) and heart rate trends. Track athletic recovery parameters automatically.</p>
    </div>
    
    <div class="sleep-card">
      <div class="sleep-header">Sleep Cycles</div>
      <div class="sleep-graph">
        <svg class="sleep-svg" viewBox="0 0 100 50" preserveAspectRatio="none">
          <path d="M 0,25 Q 10,5 20,25 T 40,25 T 60,45 T 80,25 T 100,25" />
        </svg>
      </div>
      <div class="sleep-total">
        <div class="sleep-val">7h 45m</div>
        <div style="color:#9ca3af; font-size:0.85rem; margin-top:5px; font-weight:700;">RECOVERY: 88% (GOOD)</div>
      </div>
    </div>
  </div>
</body>
</html>
