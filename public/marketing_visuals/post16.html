<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 16 - White Label Domain</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info { max-width:800px; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:15px; }
    .info h1 span { color:#3b82f6; }
    
    /* Browser bar Mockup */
    .browser-mockup { border-radius:16px; border:1px solid rgba(255,255,255,0.05); background:#1e293b; width:100%; max-width:750px; margin:auto; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.5); }
    .browser-header { background:#0f172a; padding:12px 20px; display:flex; align-items:center; gap:12px; }
    .browser-dots { display:flex; gap:6px; }
    .browser-dot { width:10px; height:10px; border-radius:50%; background:#ef4444; }
    .browser-dot:nth-child(2) { background:#f59e0b; }
    .browser-dot:nth-child(3) { background:#10b981; }
    .browser-address { flex:1; background:#1e293b; border-radius:8px; padding:6px 15px; color:#fff; font-family:monospace; font-size:0.95rem; text-align:center; }
    .browser-body { background:#060713; height:200px; padding:45px; text-align:center; color:#fff; font-size:1.5rem; font-weight:700; display:flex; align-items:center; justify-content:center; }
    
    .footer { display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Map the software to <span>your custom domain.</span></h1>
    </div>
    
    <div class="browser-mockup">
      <div class="browser-header">
        <div class="browser-dots">
          <div class="browser-dot"></div>
          <div class="browser-dot"></div>
          <div class="browser-dot"></div>
        </div>
        <div class="browser-address">https://portal.yourgymname.com</div>
      </div>
      <div class="browser-body">
        Fully White-Labeled Client Experience
      </div>
    </div>
    
    <div class="footer">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
