<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 5 - Daily Habit Goals</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Ring UI Mockup */
    .ring-box { z-index:10; width: 400px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; text-align:center; }
    .ring-svg { width: 160px; height: 160px; margin: 20px auto; transform: rotate(-90deg); }
    .ring-svg circle { fill:none; stroke-width:10; }
    .ring-bg { stroke:rgba(255,255,255,0.02); }
    .ring-active1 { stroke:#3b82f6; stroke-dasharray: 250 314; stroke-linecap:round; }
    .ring-active2 { stroke:#10b981; stroke-dasharray: 180 250; stroke-linecap:round; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Track daily <span>hydration & macros.</span></h1>
      <p>Ensure client compliance. Your clients can log daily water intake and key meal macros in seconds directly inside their visual dashboard rings.</p>
    </div>
    
    <div class="ring-box">
      <div style="color:#fff; font-weight:700; font-size:1.15rem;">Daily Athlete Score</div>
      <div class="ring-svg">
        <svg viewBox="0 0 120 120" style="width:100%; height:100%;">
          <!-- Outer circle (Water) -->
          <circle class="ring-bg" cx="60" cy="60" r="50" />
          <circle class="ring-active1" cx="60" cy="60" r="50" />
          <!-- Inner circle (Protein) -->
          <circle class="ring-bg" cx="60" cy="60" r="38" />
          <circle class="ring-active2" cx="60" cy="60" r="38" />
        </svg>
      </div>
      <div style="display:flex; justify-content:space-around; color:#fff; font-size:0.9rem; font-weight:700;">
        <div style="color:#3b82f6;">💧 Hydration: 80%</div>
        <div style="color:#10b981;">🥩 Protein: 72%</div>
      </div>
    </div>
  </div>
</body>
</html>
