<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 8 - WhatsApp/Spreadsheets vs Life Gym</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; }
    .info h1 span { color:#3b82f6; }
    
    /* Comparison Grid */
    .comp-grid { display:grid; grid-template-columns: 1fr 1fr; gap:40px; margin:auto 0; }
    .comp-panel { border-radius:24px; padding:35px; }
    .comp-panel.old { background:rgba(239,68,68,0.02); border:1px solid rgba(239,68,68,0.1); }
    .comp-panel.new { background:rgba(16,185,129,0.02); border:1px solid rgba(16,185,129,0.1); }
    
    .comp-panel h3 { font-size:1.8rem; font-weight:900; margin-bottom:20px; }
    .comp-panel.old h3 { color:#ef4444; }
    .comp-panel.new h3 { color:#10b981; }
    
    .comp-item { display:flex; align-items:center; gap:12px; margin-bottom:15px; font-size:1.15rem; color:#d1d5db; }
    .comp-item.fail span { color:#ef4444; font-weight:bold; }
    .comp-item.success span { color:#10b981; font-weight:bold; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Professionalize your <span>coaching business.</span></h1>
    </div>
    
    <div class="comp-grid">
      <div class="comp-panel old">
        <h3>WhatsApp & Sheets ❌</h3>
        <div class="comp-item fail"><span>✕</span> Lost PDF workout guides</div>
        <div class="comp-item fail"><span>✕</span> Manual check-in follow-ups</div>
        <div class="comp-item fail"><span>✕</span> No visual progress graphs</div>
      </div>
      <div class="comp-panel new">
        <h3>Your Life Gym Portal ✅</h3>
        <div class="comp-item success"><span>✓</span> Mobile workout logging app</div>
        <div class="comp-item success"><span>✓</span> Automatic WhatsApp alerts</div>
        <div class="comp-item success"><span>✓</span> Interactive InBody tracking</div>
      </div>
    </div>
    
    <div style="display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem;">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
