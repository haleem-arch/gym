<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 11 - Mobile Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    .info { max-width: 420px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }
    .phone-box { z-index:10; width: 360px; height: 720px; border: 12px solid #1e293b; border-radius: 40px; background: #0b0f19; box-shadow: 0 25px 50px rgba(0,0,0,0.8); padding: 15px; position: relative; }
    .phone-screen { width: 100%; height: 100%; border-radius: 26px; background: #060713; padding: 30px 20px; display: flex; flex-direction: column; justify-content: center; }
    .login-input { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); padding:14px; border-radius:12px; color:#fff; font-size:0.9rem; margin-bottom:15px; }
    .login-btn { background:#3b82f6; color:#fff; font-weight:700; padding:14px; border:none; border-radius:12px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Custom client <span>login portal.</span></h1>
      <p>Give your clients a sleek mobile web application interface. Athletes can bookmark the portal to log workouts and check progress without installing complex apps.</p>
    </div>
    <div class="phone-box">
      <div class="phone-screen">
        <div style="text-align:center; margin-bottom:40px;">
          <div style="font-size:2.2rem; font-weight:900; color:#fff; letter-spacing:0.02em;">Life<span>Gym</span></div>
          <div style="font-size:0.8rem; color:#9ca3af; margin-top:5px;">ENTER PORTAL CODE</div>
        </div>
        <input type="text" class="login-input" placeholder="Email Address" value="ahmed.samy@mail.com" readonly>
        <input type="password" class="login-input" placeholder="Password Code" value="••••••••" readonly>
        <button class="login-btn">Log In</button>
      </div>
    </div>
  </div>
</body>
</html>
