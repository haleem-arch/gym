<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 19 - Coach Testimonial</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; }
    .info h1 span { color:#3b82f6; }
    
    /* Testimonial Box */
    .testimonial-box { background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.05); border-radius:24px; padding:40px; margin:auto 0; max-width:800px; }
    .testi-text { font-size:1.8rem; color:#fff; line-height:1.5; font-weight:300; margin-bottom:25px; }
    .testi-author { display:flex; align-items:center; gap:15px; }
    .author-avatar { width:50px; height:50px; border-radius:50%; background:#3b82f6; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .author-name { font-weight:700; color:#fff; font-size:1.2rem; }
    .author-title { font-size:0.9rem; color:#9ca3af; margin-top:2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Loved by premium <span>coaches.</span></h1>
    </div>
    
    <div class="testimonial-box">
      <div class="testi-text">"Before Life Gym, I was copy-pasting Google Drive sheet links to 40 clients on WhatsApp. Now everything is automated and my business looks 10x more professional."</div>
      <div class="testi-author">
        <div class="author-avatar">MS</div>
        <div>
          <div class="author-name">Coach Mohamed Sherif</div>
          <div class="author-title">Elite Strength Coach</div>
        </div>
      </div>
    </div>
    
    <div style="display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem;">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
