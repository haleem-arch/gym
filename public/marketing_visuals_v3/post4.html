<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 4 - Muscle Mass Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; align-items:center; justify-content:space-between; position:relative; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-left { bottom:-100px; left:-100px; }
    .info { max-width:440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }
    .chart-panel { z-index:10; width: 440px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
    .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
    .chart-val { font-size:2rem; font-weight:900; color:#fff; }
    .chart-val span { font-size:1rem; color:#10b981; margin-left:8px; }
    .chart-container { height:180px; width:100%; border-bottom: 2px solid rgba(255,255,255,0.05); border-left: 2px solid rgba(255,255,255,0.05); position:relative; }
    .chart-svg { width:100%; height:100%; fill:none; stroke:#3b82f6; stroke-width:4; stroke-linecap:round; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-left"></div>
    <div class="info">
      <h1>Sleek progress <span>biometrics.</span></h1>
      <p>Keep your clients motivated with clear visual biometrics tracking. Monitor weight fluctuations and muscle mass index trends directly in their profile.</p>
    </div>
    <div class="chart-panel">
      <div class="chart-header">
        <div>
          <div style="font-size:0.85rem; color:#9ca3af; text-transform:uppercase; letter-spacing:0.05em;">Skeletal Muscle Mass</div>
          <div class="chart-val">38.4 kg <span>+1.2kg</span></div>
        </div>
        <div style="background:rgba(59,130,246,0.1); color:#3b82f6; font-size:0.75rem; font-weight:700; padding:5px 10px; border-radius:10px;">Biometrics</div>
      </div>
      <div class="chart-container">
        <svg class="chart-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path d="M 0,80 Q 25,60 50,45 T 100,20" />
          <circle cx="100" cy="20" r="4" fill="#3b82f6" />
        </svg>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:15px; color:#9ca3af; font-size:0.8rem;">
        <div>Week 1</div>
        <div>Week 4</div>
        <div>Week 8</div>
      </div>
    </div>
  </div>
</body>
</html>
