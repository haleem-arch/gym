<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 18 - Set Logger UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }
    .logger-panel { z-index:10; width: 420px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
    .set-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .set-badge { background:rgba(255,255,255,0.05); border-radius:8px; padding:6px 12px; color:#fff; font-weight:700; font-size:0.9rem; }
    .set-input { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); padding:8px 12px; border-radius:8px; width:70px; text-align:center; color:#fff; font-size:0.9rem; }
    .set-check { width:28px; height:28px; border-radius:6px; background:#10b981; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Streamlined workout <span>logging UI.</span></h1>
      <p>No more messy WhatsApp messages. Your clients log their target weights, sets, and reps with a simple clean layout that updates your panel in real-time.</p>
    </div>
    <div class="logger-panel">
      <div style="color:#fff; font-weight:700; font-size:1.2rem; margin-bottom:20px;">Exercise: Flat Bench Press</div>
      <div class="set-row">
        <span class="set-badge">Set 1</span>
        <input type="text" class="set-input" value="100 kg" readonly>
        <input type="text" class="set-input" value="8 reps" readonly>
        <div class="set-check">✓</div>
      </div>
      <div class="set-row">
        <span class="set-badge">Set 2</span>
        <input type="text" class="set-input" value="100 kg" readonly>
        <input type="text" class="set-input" value="8 reps" readonly>
        <div class="set-check">✓</div>
      </div>
      <div class="set-row">
        <span class="set-badge">Set 3</span>
        <input type="text" class="set-input" value="100 kg" readonly>
        <input type="text" class="set-input" value="6 reps" readonly>
        <div class="set-check">✓</div>
      </div>
    </div>
  </div>
</body>
</html>
