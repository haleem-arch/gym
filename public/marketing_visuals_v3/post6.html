<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 6 - Client Workout Splits</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; }
    .info h1 span { color:#3b82f6; }
    .split-grid { display:grid; grid-template-columns: 1fr 1fr; gap:30px; margin:auto 0; }
    .split-card { background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.05); border-radius:24px; padding:35px; }
    .split-card h3 { color:#fff; font-size:1.6rem; font-weight:800; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
    .split-card h3 span { color:#3b82f6; font-size:0.9rem; font-weight:700; background:rgba(59,130,246,0.1); padding:4px 10px; border-radius:8px; }
    .exercise-item { display:flex; justify-content:space-between; color:#d1d5db; font-size:1.15rem; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Custom training <span>splits & routines.</span></h1>
    </div>
    <div class="split-grid">
      <div class="split-card">
        <h3>Push Day <span>Day 1</span></h3>
        <div class="exercise-item"><span>Incline Bench Press</span> <span>4 x 8</span></div>
        <div class="exercise-item"><span>Overhead Dumbbell Press</span> <span>3 x 10</span></div>
        <div class="exercise-item"><span>Lateral Raises</span> <span>4 x 15</span></div>
      </div>
      <div class="split-card">
        <h3>Pull Day <span>Day 2</span></h3>
        <div class="exercise-item"><span>Weighted Pull-Ups</span> <span>4 x 6</span></div>
        <div class="exercise-item"><span>Barbell Rows</span> <span>3 x 8</span></div>
        <div class="exercise-item"><span>Face Pulls</span> <span>3 x 15</span></div>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem;">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
