<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 3 - Client Compliance Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info { max-width:800px; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:15px; }
    .info h1 span { color:#3b82f6; }
    
    /* Client List Dashboard */
    .dashboard-panel { width: 100%; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); border-radius:24px; padding:35px; }
    .dash-row { display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.05); padding:15px 0; }
    .dash-row:last-child { border:none; padding-bottom:0; }
    .client-info { display:flex; align-items:center; gap:15px; }
    .client-avatar { width:45px; height:45px; border-radius:50%; background:#1e293b; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .client-name { font-weight:700; color:#fff; font-size:1.15rem; }
    .client-plan { font-size:0.85rem; color:#9ca3af; margin-top:2px; }
    
    .status-pill { padding:6px 14px; border-radius:100px; font-weight:700; font-size:0.85rem; }
    .status-pill.success { background:rgba(16,185,129,0.1); color:#10b981; border:1px solid rgba(16,185,129,0.2); }
    .status-pill.warning { background:rgba(245,158,11,0.1); color:#f59e0b; border:1px solid rgba(245,158,11,0.2); }
    .status-pill.error { background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Track client <span>compliance</span> at a glance.</h1>
    </div>
    
    <div class="dashboard-panel">
      <div class="dash-row">
        <div class="client-info">
          <div class="client-avatar">AS</div>
          <div>
            <div class="client-name">Ahmed Samy</div>
            <div class="client-plan">Split: Hypertrophy Phase 2</div>
          </div>
        </div>
        <div class="status-pill success">100% Completed</div>
      </div>
      <div class="dash-row">
        <div class="client-info">
          <div class="client-avatar">MA</div>
          <div>
            <div class="client-name">Mohamed Ali</div>
            <div class="client-plan">Split: Powerlifting Strength</div>
          </div>
        </div>
        <div class="status-pill warning">92% Logged</div>
      </div>
      <div class="dash-row">
        <div class="client-info">
          <div class="client-avatar">OM</div>
          <div>
            <div class="client-name">Omar Mostafa</div>
            <div class="client-plan">Split: Calisthenics Basics</div>
          </div>
        </div>
        <div class="status-pill error">Pending logs</div>
      </div>
    </div>
    
    <div style="display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem;">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
