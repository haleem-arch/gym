<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 9 - Macronutrients Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Macros Dashboard Widget */
    .macros-widget { z-index:10; width: 400px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
    .macro-bar-container { margin-top:20px; }
    .macro-bar-label { display:flex; justify-content:space-between; color:#fff; font-size:1.05rem; font-weight:700; margin-bottom:8px; }
    .macro-bar-bg { width:100%; height:12px; background:rgba(255,255,255,0.02); border-radius:6px; overflow:hidden; }
    .macro-bar-fill { height:100%; border-radius:6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Custom client <span>nutrition targets.</span></h1>
      <p>Set personalized calorie and macronutrient targets for your athletes. Clients log meals to meet daily targets while you track their stats instantly.</p>
    </div>
    
    <div class="macros-widget">
      <div style="color:#fff; font-weight:700; font-size:1.2rem; margin-bottom:15px;">Daily Macros Progress</div>
      
      <div class="macro-bar-container">
        <div class="macro-bar-label"><span>Protein</span> <span style="color:#3b82f6;">150g / 180g</span></div>
        <div class="macro-bar-bg"><div class="macro-bar-fill" style="width:83%; background:#3b82f6;"></div></div>
      </div>
      
      <div class="macro-bar-container">
        <div class="macro-bar-label"><span>Carbohydrates</span> <span style="color:#10b981;">210g / 250g</span></div>
        <div class="macro-bar-bg"><div class="macro-bar-fill" style="width:84%; background:#10b981;"></div></div>
      </div>
      
      <div class="macro-bar-container">
        <div class="macro-bar-label"><span>Fats</span> <span style="color:#f59e0b;">60g / 70g</span></div>
        <div class="macro-bar-bg"><div class="macro-bar-fill" style="width:85%; background:#f59e0b;"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
