<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 44 - Client water log pop-up modal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }
    .mock-box { z-index:10; width: 420px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Quick-tap water <span>logging metrics.</span></h1>
      <p>Log daily hydration fluid metrics in seconds. tap default logging preset values like 0.25L, 0.5L, or 1.0L to hit target levels.</p>
    </div>
    <div class="mock-box">
      <div style="color:#fff; font-weight:700; margin-bottom:15px; text-align:center;">Add Water Log</div>
      <div style="display:flex; justify-content:space-between; gap:10px;">
        <button style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:10px; color:#3b82f6; font-weight:700;">+0.25L</button>
        <button style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:10px; color:#3b82f6; font-weight:700;">+0.50L</button>
        <button style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:10px; color:#3b82f6; font-weight:700;">+1.00L</button>
      </div>
    </div>
  </div>
</body>
</html>
