<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 5 - Body Fat Percentage Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#020205;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
    }
    .card {
      width:1080px;
      height:1080px;
      background:#04040a;
      border:1px solid #111322;
      padding:80px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .grid-bg {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 1;
    }
    .glow-radial {
      position:absolute;
      width:600px;
      height:600px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(251, 113, 133, 0.16) 0%, rgba(0,0,0,0) 70%);
      filter:blur(60px);
      z-index: 2;
    }
    .glow-1 { top:-150px; left:-150px; }
    .glow-2 { bottom:-150px; right:-150px; }
    
    .content-area {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      z-index: 10;
      position: relative;
      width: 100%;
    }
    
    /* Central Mockup Device */
    .device-frame {
      width: 380px;
      height: 680px;
      background: #090a12;
      border: 8px solid #1e2030;
      border-radius: 44px;
      position: relative;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 15;
    }
    .device-notch {
      width: 140px;
      height: 24px;
      background: #1e2030;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .device-screen {
      flex: 1;
      padding: 38px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      background: #05060f;
    }
    
    /* Elegant Callout overlays */
    .callout {
      position: absolute;
      backdrop-filter: blur(20px);
      background: rgba(17, 19, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 24px;
      width: 280px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .callout-left { left: 40px; top: 280px; border-left: 3px solid #fb7185; }
    .callout-right { right: 40px; bottom: 280px; border-right: 3px solid #fb7185; }
    
    .callout-title {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .callout-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    
    /* Heading area */
    .header-text {
      z-index: 10;
      margin-bottom: 20px;
      text-align: center;
    }
    .header-text h2 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }
    .header-text h2 span {
      background: linear-gradient(135deg, #fff 30%, #fb7185 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #4b5563;
      font-size: 1.05rem;
      font-weight: 700;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="glow-radial glow-1"></div>
    <div class="glow-radial glow-2"></div>
    
    <div class="header-text">
      <h2><span>Body Fat Percentage Progress</span></h2>
    </div>
    
    <div class="content-area">
      <!-- Left Callout -->
      <div class="callout callout-left">
        <div class="callout-title">Scan History</div>
        <div class="callout-desc">Map changes in client body fat metrics compared to baseline scans.</div>
      </div>
      
      <!-- Center Phone Frame -->
      <div class="device-frame">
        <div class="device-notch"></div>
        <div class="device-screen">
          
      <div style="background:#0c1020; height:100%; border-radius:24px; padding:20px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid rgba(255,255,255,0.05);">
        <div>
          <div style="color:#9ca3af; font-size:0.8rem; text-transform:uppercase;">Body Composition</div>
          <div style="color:#fff; font-size:1.8rem; font-weight:900; margin-top:5px;">16.4% <span style="font-size:0.9rem; color:#ef4444; font-weight:bold;">-1.8%</span></div>
          <div style="color:#9ca3af; font-size:0.8rem; margin-top:2px;">Baseline: 18.2%</div>
        </div>
        <div style="background:rgba(255,255,255,0.02); padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
          <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#9ca3af; margin-bottom:6px;"><span>Lean Target</span><span>12% - 15%</span></div>
          <div style="position:relative; width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:4px;">
            <div style="position:absolute; left:30%; width:30%; height:100%; background:#10b981; border-radius:4px;"></div>
            <div style="position:absolute; left:50%; width:8px; height:8px; border-radius:50%; background:#fff; border:2px solid #3b82f6; transform:translate(-50%, 0);"></div>
          </div>
        </div>
      </div>
    
        </div>
      </div>
      
      <!-- Right Callout -->
      <div class="callout callout-right">
        <div class="callout-title">Linear Gauges</div>
        <div class="callout-desc">Display body fat ranges to highlight progress towards lean targets.</div>
      </div>
    </div>
    
    <div class="footer-bar">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
