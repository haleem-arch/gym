<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Gym - Coach Marketing Kit V4 (Mobile-First)</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #020205;
      --card-bg: rgba(17, 19, 30, 0.75);
      --border-color: rgba(139, 92, 246, 0.15);
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --accent-purple: #c084fc;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.08) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 40px 20px;
    }
    header { text-align: center; margin-bottom: 40px; }
    .brand-pill { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); padding: 6px 18px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent-purple); display: inline-block; margin-bottom: 16px; }
    header h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #ffffff 40%, var(--accent-purple) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .main-layout { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; gap: 30px; }
    .sidebar { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; max-height: 850px; overflow-y: auto; }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 3px; }
    .post-nav-item { display: flex; flex-direction: column; padding: 14px 18px; border-radius: 14px; cursor: pointer; margin-bottom: 10px; background: rgba(255, 255, 255, 0.02); border: 1px solid transparent; transition: all 0.2s ease; }
    .post-nav-item.active { background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(59, 130, 246, 0.08) 100%); border-color: rgba(139, 92, 246, 0.4); }
    .post-nav-item .tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent-purple); margin-bottom: 4px; }
    .post-nav-item .title { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .preview-container { display: grid; grid-template-columns: 540px 1fr; gap: 30px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 32px; padding: 30px; }
    .instagram-frame { width: 540px; height: 540px; background: #020205; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); }
    .instagram-frame iframe { width: 1080px; height: 1080px; border: none; transform: scale(0.5); transform-origin: top left; }
    .details-panel { display: flex; flex-direction: column; justify-content: space-between; min-height: 540px; }
    .caption-box { background: rgba(2, 2, 5, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 16px; color: #e2e8f0; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; height: 320px; }
    .copy-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s ease; font-size: 1rem; }
    .copy-btn:hover { background: var(--primary-hover); }
  </style>
</head>
<body>
  <header>
    <div class="brand-pill">Life Gym Coach Marketing Kit v4</div>
    <h1>Mobile-First Device Graphics</h1>
  </header>
  <div class="main-layout">
    <div class="sidebar">
      <h2 style="font-size:1.2rem; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px;">V4 Mockups</h2>
      <div id="nav-list"></div>
    </div>
    <div class="preview-container">
      <div class="instagram-frame">
        <iframe id="preview-iframe" src=""></iframe>
      </div>
      <div class="details-panel">
        <div>
          <h3 id="mockup-title" style="font-size:1.6rem; font-weight:900; margin-bottom:10px;">Post Title</h3>
          <p id="mockup-desc" style="color:var(--text-muted); font-size:1rem; line-height:1.5; margin-bottom:20px;">Premium Mobile Device Mockup demonstrating Life Gym portal capabilities.</p>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; margin-bottom:15px;">
          <div style="font-size:0.85rem; font-weight:700; text-transform:uppercase; color:var(--accent-purple); margin-bottom:8px;">Instagram Caption</div>
          <div id="caption-text" class="caption-box"></div>
        </div>
        <button class="copy-btn" onclick="copyCaption()">Copy Caption</button>
      </div>
    </div>
  </div>
  <script>
    const configs = [{"id":1,"title":"Welcome Credentials Invitation","desc":"Welcome clients automatically with auto-generated portal credentials via WhatsApp."},{"id":2,"title":"Daily Check-in Auto-Nudges","desc":"Remind clients to stay consistent using friendly automated reminders."},{"id":3,"title":"Nutrition Macros Dashboard","desc":"High-fidelity target macro charts keep nutritional profiles in sync."},{"id":4,"title":"Quick-Tap Hydration Tracker","desc":"Log fluid values dynamically with pre-configured logging triggers."},{"id":5,"title":"Body Fat Percentage Progress","desc":"Track client body fat reduction milestones over training periods."},{"id":6,"title":"Skeletal Muscle Mass Chart","desc":"Visualize real skeletal muscle gains over multiple training blocks."},{"id":7,"title":"Workout Set & Rep Logger","desc":"Clients log working sets, target repetitions, and RPE inside the gym."},{"id":8,"title":"Active Workout Companion","desc":"Active session companion screens display timer logs and current routines."},{"id":9,"title":"Exercise Form Cues Library","desc":"Embed precise movement directions to prevent injuries during heavy lifting."},{"id":10,"title":"Client Compliance Adherence","desc":"Calculate program compliance rates to identify off-track athletes."},{"id":11,"title":"Onboarding Step 1: Client Identity","desc":"Create client login credentials and generate secure invitation codes."},{"id":12,"title":"Onboarding Step 2: Routines Split","desc":"Assign custom training programs from template splits during onboarding."},{"id":13,"title":"Onboarding Step 3: Diet Targets","desc":"Configure baseline calories and training vs rest day macronutrient adjustments."},{"id":14,"title":"Onboarding Step 4: Baseline InBody","desc":"Record starting weight and baseline skeletal body compositions."},{"id":15,"title":"Weekly Hydration Consistency Map","desc":"Interactive calendars with color-coded markers showcase hydration logs."},{"id":16,"title":"Verified Foods Directory","desc":"Instant directory access to localized macro-nutrient database tables."},{"id":17,"title":"Custom Food Recipe Creator","desc":"Permit clients to input packaged foods or custom recipes directly."},{"id":18,"title":"Subscription Validity Monitor","desc":"Highlight package durations and automate account suspensions."},{"id":19,"title":"Secure Client Notes Vault","desc":"Log private remarks regarding injuries, goals, or schedule changes."},{"id":20,"title":"Weekly Adherence Heatmap","desc":"Compact weekly grids chart consistency ratings across client groups."},{"id":21,"title":"Custom Branded Subdomains","desc":"Host client portals on private branded domains or web locations."},{"id":22,"title":"Membership Tiers Editor","desc":"Configure coaching packages and duration parameters."},{"id":23,"title":"Rest Day Macro Configurator","desc":"Manage custom rest day scales to ensure proper client recovery."},{"id":24,"title":"InBody Segment Analysis","desc":"Map localized muscle-to-fat distributions across the physique."},{"id":25,"title":"Weekly Compliance Summary","desc":"Present detailed performance charts mapping weekly compliance rates."},{"id":26,"title":"Workout Rest Timer UI","desc":"Countdown rest timers keep client training sessions intense and focused."},{"id":27,"title":"Client Action Logs Timeline","desc":"A daily timeline records check-ins and logs client uploads."},{"id":28,"title":"Client Macro Target Breakdown","desc":"Compare daily macro intake totals using horizontal bar charts."},{"id":29,"title":"Weight Loss Milestones","desc":"Line charts plot target milestones against historical client weights."},{"id":30,"title":"Client Search & Directory Filters","desc":"Search, select, and filter coach clients inside active directories."},{"id":31,"title":"InBody Composition Logs","desc":"Maintain chronologically-ordered historical lists of all InBody composition scans."},{"id":32,"title":"Client Profile Settings Toggle","desc":"Toggles for configuring WhatsApp check-in rules and system alerts."},{"id":33,"title":"Daily Meal Category Budgets","desc":"Track client calorie target metrics across breakfast, lunch, and dinner."},{"id":34,"title":"PWA Mobile App Setup","desc":"Installs as a standalone home-screen app to bypass store delays."},{"id":35,"title":"Account Suspended Notification","desc":"Clean notifications restrict portal features when packages expire."},{"id":36,"title":"Weight Fluctuation Analyzer","desc":"Averages daily weight inputs to identify weight-reduction trends."},{"id":37,"title":"Deadlift Safety Cues","desc":"Embed safety cues inside programs to prevent lower-back strain."},{"id":38,"title":"Access Code WhatsApp Template","desc":"A layout showing automated single-use credential templates."},{"id":39,"title":"Coaching Capacity Monitor","desc":"Track client capacity statistics to manage onboarding spots."},{"id":40,"title":"Daily Habit Checklist","desc":"Enforce healthy habits like sleep, steps, and protein targets daily."},{"id":41,"title":"Hydration Intake Visualizer","desc":"A layout highlighting active water intakes compared to targets."},{"id":42,"title":"Weekly Training Calendar","desc":"Visualize training splits scheduled across days of the week."},{"id":43,"title":"Macro Targets Summary Card","desc":"Compact summary cards show caloric limits and macro targets."},{"id":44,"title":"Egyptian Local Foods Catalog","desc":"Search tool queries macros of localized Egyptian dishes."},{"id":45,"title":"Custom Recipe Calculator","desc":"Calculate final recipe macros based on ingredient weights."},{"id":46,"title":"Coach Client Status Counts","desc":"Graph indicators chart active, suspended, and pending client numbers."},{"id":47,"title":"Exercise Safety Libraries","desc":"A layout detailing exercise tutorials and instructional libraries."},{"id":48,"title":"Secure Client Notes Vault Details","desc":"Store private coach comments regarding client injury recoveries."},{"id":49,"title":"PWA Standalone App Frame","desc":"A layout showcasing standalone PWA PWA portal displays."},{"id":50,"title":"Coach Directory Growth Stats","desc":"Summary cards highlight active coaching slots and growth metrics."}];
    const navList = document.getElementById('nav-list');
    const iframe = document.getElementById('preview-iframe');
    const title = document.getElementById('mockup-title');
    const desc = document.getElementById('mockup-desc');
    const captionText = document.getElementById('caption-text');
    
    function init() {
      configs.forEach(config => {
        const item = document.createElement('div');
        item.className = 'post-nav-item' + (config.id === 1 ? ' active' : '');
        item.onclick = () => select(config.id);
        item.innerHTML = '<span class="tag">Post ' + config.id + '</span><span class="title">' + config.title + '</span>';
        navList.appendChild(item);
      });
      select(1);
    }
    
    function select(id) {
      const items = document.querySelectorAll('.post-nav-item');
      items.forEach((item, idx) => {
        if ((idx + 1) === id) item.classList.add('active');
        else item.classList.remove('active');
      });
      iframe.src = 'post' + id + '.html';
      const config = configs.find(c => c.id === id);
      title.innerText = 'Post ' + id + ': ' + config.title;
      desc.innerText = config.desc;
      
      let cap = '==================================================\n';
      cap += 'POST ' + id + ': ' + config.title.toUpperCase() + '\n';
      cap += '==================================================\n';
      cap += 'Coaches: ' + config.desc + '\n\n';
      cap += 'Say goodbye to administrative headaches. Give your athletes a premium web-based tracking experience, customized credentials, and automated reminder alerts straight to their WhatsApp.\n\n';
      cap += '👉 Scale your coaching client capacity today. Tap the link in bio to start your 14-day free trial! @lifegym.io';
      captionText.innerText = cap;
    }
    
    function copyCaption() {
      navigator.clipboard.writeText(captionText.innerText).then(() => {
        alert("Instagram caption copied to clipboard!");
      });
    }
    
    init();
  </script>
</body>
</html>
