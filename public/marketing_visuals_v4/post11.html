<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 11 - Onboarding Step 1: Client Identity</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#020205;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
    }
    .card {
      width:1080px;
      height:1080px;
      background:#04040a;
      border:1px solid #111322;
      padding:80px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .grid-bg {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 1;
    }
    .glow-radial {
      position:absolute;
      width:600px;
      height:600px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.16) 0%, rgba(0,0,0,0) 70%);
      filter:blur(60px);
      z-index: 2;
    }
    .glow-1 { top:-150px; left:-150px; }
    .glow-2 { bottom:-150px; right:-150px; }
    
    .content-area {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      z-index: 10;
      position: relative;
      width: 100%;
    }
    
    /* Central Mockup Device */
    .device-frame {
      width: 380px;
      height: 680px;
      background: #090a12;
      border: 8px solid #1e2030;
      border-radius: 44px;
      position: relative;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 15;
    }
    .device-notch {
      width: 140px;
      height: 24px;
      background: #1e2030;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .device-screen {
      flex: 1;
      padding: 38px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      background: #05060f;
    }
    
    /* Elegant Callout overlays */
    .callout {
      position: absolute;
      backdrop-filter: blur(20px);
      background: rgba(17, 19, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 24px;
      width: 280px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .callout-left { left: 40px; top: 280px; border-left: 3px solid #8b5cf6; }
    .callout-right { right: 40px; bottom: 280px; border-right: 3px solid #8b5cf6; }
    
    .callout-title {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .callout-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    
    /* Heading area */
    .header-text {
      z-index: 10;
      margin-bottom: 20px;
      text-align: center;
    }
    .header-text h2 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }
    .header-text h2 span {
      background: linear-gradient(135deg, #fff 30%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #4b5563;
      font-size: 1.05rem;
      font-weight: 700;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="glow-radial glow-1"></div>
    <div class="glow-radial glow-2"></div>
    
    <div class="header-text">
      <h2><span>Onboarding Step 1: Client Identity</span></h2>
    </div>
    
    <div class="content-area">
      <!-- Left Callout -->
      <div class="callout callout-left">
        <div class="callout-title">Step 1: Identity</div>
        <div class="callout-desc">Create profile settings including username, email, and gender.</div>
      </div>
      
      <!-- Center Phone Frame -->
      <div class="device-frame">
        <div class="device-notch"></div>
        <div class="device-screen">
          
      <div style="background:#0c1020; height:100%; border-radius:24px; padding:20px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid rgba(255,255,255,0.05);">
        <div>
          <div style="color:#8b5cf6; font-size:0.75rem; font-weight:bold; text-transform:uppercase;">Onboarding Portal</div>
          <div style="color:#fff; font-weight:700; font-size:1.1rem; margin-top:2px;">Step 1: Identity Profile</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; margin:15px 0;">
          <div>
            <label style="color:#9ca3af; font-size:0.75rem; display:block; margin-bottom:4px;">Full Name</label>
            <input type="text" style="width:100%; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); padding:8px; border-radius:6px; color:#fff; font-size:0.8rem;" value="Ahmed Samy" readonly>
          </div>
          <div>
            <label style="color:#9ca3af; font-size:0.75rem; display:block; margin-bottom:4px;">Client Email</label>
            <input type="text" style="width:100%; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); padding:8px; border-radius:6px; color:#fff; font-size:0.8rem;" value="ahmed.samy@mail.com" readonly>
          </div>
          <div>
            <label style="color:#9ca3af; font-size:0.75rem; display:block; margin-bottom:4px;">Onboarding Access Code</label>
            <div style="background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); padding:8px; border-radius:6px; color:#8b5cf6; font-family:monospace; font-size:0.85rem; font-weight:bold; text-align:center;">LG-938210</div>
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#9ca3af;">
          <span>Progress</span><span>25% Complete</span>
        </div>
      </div>
    
        </div>
      </div>
      
      <!-- Right Callout -->
      <div class="callout callout-right">
        <div class="callout-title">Secure Passkeys</div>
        <div class="callout-desc">Generate secure passcode strings for initial PWA logins.</div>
      </div>
    </div>
    
    <div class="footer-bar">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
