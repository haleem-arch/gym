<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 4 - Quick-Tap Hydration Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#020205;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
    }
    .card {
      width:1080px;
      height:1080px;
      background:#04040a;
      border:1px solid #111322;
      padding:80px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .grid-bg {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 1;
    }
    .glow-radial {
      position:absolute;
      width:600px;
      height:600px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.16) 0%, rgba(0,0,0,0) 70%);
      filter:blur(60px);
      z-index: 2;
    }
    .glow-1 { top:-150px; left:-150px; }
    .glow-2 { bottom:-150px; right:-150px; }
    
    .content-area {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      z-index: 10;
      position: relative;
      width: 100%;
    }
    
    /* Central Mockup Device */
    .device-frame {
      width: 380px;
      height: 680px;
      background: #090a12;
      border: 8px solid #1e2030;
      border-radius: 44px;
      position: relative;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 15;
    }
    .device-notch {
      width: 140px;
      height: 24px;
      background: #1e2030;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .device-screen {
      flex: 1;
      padding: 38px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      background: #05060f;
    }
    
    /* Elegant Callout overlays */
    .callout {
      position: absolute;
      backdrop-filter: blur(20px);
      background: rgba(17, 19, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 24px;
      width: 280px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .callout-left { left: 40px; top: 280px; border-left: 3px solid #38bdf8; }
    .callout-right { right: 40px; bottom: 280px; border-right: 3px solid #38bdf8; }
    
    .callout-title {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .callout-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    
    /* Heading area */
    .header-text {
      z-index: 10;
      margin-bottom: 20px;
      text-align: center;
    }
    .header-text h2 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }
    .header-text h2 span {
      background: linear-gradient(135deg, #fff 30%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #4b5563;
      font-size: 1.05rem;
      font-weight: 700;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="glow-radial glow-1"></div>
    <div class="glow-radial glow-2"></div>
    
    <div class="header-text">
      <h2><span>Quick-Tap Hydration Tracker</span></h2>
    </div>
    
    <div class="content-area">
      <!-- Left Callout -->
      <div class="callout callout-left">
        <div class="callout-title">Preset Triggers</div>
        <div class="callout-desc">Tap preset liquid metrics like 0.25L, 0.50L, and 1.0L for instant logging.</div>
      </div>
      
      <!-- Center Phone Frame -->
      <div class="device-frame">
        <div class="device-notch"></div>
        <div class="device-screen">
          
      <div style="background:#0c1020; height:100%; border-radius:24px; padding:20px; display:flex; flex-direction:column; justify-content:space-between; text-align:center; border:1px solid rgba(255,255,255,0.05);">
        <div style="color:#fff; font-weight:700; font-size:1.1rem;">Hydration Tracker</div>
        <div style="margin:20px auto; position:relative; width:100px; height:160px; border:4px solid #38bdf8; border-radius:16px 16px 24px 24px; overflow:hidden; background:rgba(56, 189, 248, 0.05);">
          <div style="position:absolute; bottom:0; width:100%; height:60%; background:linear-gradient(0deg, #0284c7 0%, #38bdf8 100%); transition:height 0.3s ease;"></div>
          <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:#fff; font-weight:bold; font-size:1.1rem; z-index:10;">1.8L</div>
        </div>
        <div style="color:#9ca3af; font-size:0.85rem; margin-bottom:15px;">Target: 3.0 Liters</div>
        <div style="display:flex; justify-content:space-between; gap:8px;">
          <button style="flex:1; background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.2); border-radius:8px; padding:8px 0; color:#38bdf8; font-weight:bold; font-size:0.8rem;">+0.25L</button>
          <button style="flex:1; background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.2); border-radius:8px; padding:8px 0; color:#38bdf8; font-weight:bold; font-size:0.8rem;">+0.50L</button>
          <button style="flex:1; background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.2); border-radius:8px; padding:8px 0; color:#38bdf8; font-weight:bold; font-size:0.8rem;">+1.00L</button>
        </div>
      </div>
    
        </div>
      </div>
      
      <!-- Right Callout -->
      <div class="callout callout-right">
        <div class="callout-title">Interactive SVG</div>
        <div class="callout-desc">The water bottle fills up dynamically as hydration is reported.</div>
      </div>
    </div>
    
    <div class="footer-bar">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
