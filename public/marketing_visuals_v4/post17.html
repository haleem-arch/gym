<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 17 - Custom Food Recipe Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#020205;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
    }
    .card {
      width:1080px;
      height:1080px;
      background:#04040a;
      border:1px solid #111322;
      padding:80px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .grid-bg {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 1;
    }
    .glow-radial {
      position:absolute;
      width:600px;
      height:600px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.16) 0%, rgba(0,0,0,0) 70%);
      filter:blur(60px);
      z-index: 2;
    }
    .glow-1 { top:-150px; left:-150px; }
    .glow-2 { bottom:-150px; right:-150px; }
    
    .content-area {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      z-index: 10;
      position: relative;
      width: 100%;
    }
    
    /* Central Mockup Device */
    .device-frame {
      width: 380px;
      height: 680px;
      background: #090a12;
      border: 8px solid #1e2030;
      border-radius: 44px;
      position: relative;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 15;
    }
    .device-notch {
      width: 140px;
      height: 24px;
      background: #1e2030;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .device-screen {
      flex: 1;
      padding: 38px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      background: #05060f;
    }
    
    /* Elegant Callout overlays */
    .callout {
      position: absolute;
      backdrop-filter: blur(20px);
      background: rgba(17, 19, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 24px;
      width: 280px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .callout-left { left: 40px; top: 280px; border-left: 3px solid #f59e0b; }
    .callout-right { right: 40px; bottom: 280px; border-right: 3px solid #f59e0b; }
    
    .callout-title {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .callout-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    
    /* Heading area */
    .header-text {
      z-index: 10;
      margin-bottom: 20px;
      text-align: center;
    }
    .header-text h2 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }
    .header-text h2 span {
      background: linear-gradient(135deg, #fff 30%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #4b5563;
      font-size: 1.05rem;
      font-weight: 700;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="glow-radial glow-1"></div>
    <div class="glow-radial glow-2"></div>
    
    <div class="header-text">
      <h2><span>Custom Food Recipe Creator</span></h2>
    </div>
    
    <div class="content-area">
      <!-- Left Callout -->
      <div class="callout callout-left">
        <div class="callout-title">Recipe Builders</div>
        <div class="callout-desc">Create macros for homemade meals or package foods.</div>
      </div>
      
      <!-- Center Phone Frame -->
      <div class="device-frame">
        <div class="device-notch"></div>
        <div class="device-screen">
          
      <div style="background:#0c1020; height:100%; border-radius:24px; padding:18px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid rgba(255,255,255,0.05);">
        <div>
          <div style="color:#fff; font-weight:700; font-size:0.95rem; margin-bottom:12px;">Create Custom Food</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div>
              <span style="color:#9ca3af; font-size:0.7rem;">Food Name</span>
              <div style="color:#fff; font-size:0.85rem; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); padding:6px; border-radius:6px; margin-top:2px;">Homemade Oats Bowl</div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:6px;">
              <div>
                <span style="color:#9ca3af; font-size:0.7rem;">Carbs (g)</span>
                <div style="color:#fff; font-size:0.85rem; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); padding:6px; border-radius:6px; text-align:center; margin-top:2px;">45</div>
              </div>
              <div>
                <span style="color:#9ca3af; font-size:0.7rem;">Protein (g)</span>
                <div style="color:#fff; font-size:0.85rem; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); padding:6px; border-radius:6px; text-align:center; margin-top:2px;">12</div>
              </div>
              <div>
                <span style="color:#9ca3af; font-size:0.7rem;">Fats (g)</span>
                <div style="color:#fff; font-size:0.85rem; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); padding:6px; border-radius:6px; text-align:center; margin-top:2px;">8</div>
              </div>
            </div>
          </div>
        </div>
        <button style="width:100%; background:#f59e0b; border:none; color:#05060f; font-weight:bold; padding:8px 0; border-radius:8px; font-size:0.8rem;">Save & Log Food</button>
      </div>
    
        </div>
      </div>
      
      <!-- Right Callout -->
      <div class="callout callout-right">
        <div class="callout-title">Quick Store</div>
        <div class="callout-desc">Save creations to personal lists for future logs.</div>
      </div>
    </div>
    
    <div class="footer-bar">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
