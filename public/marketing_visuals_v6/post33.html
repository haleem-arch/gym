<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 33 - Secure private notes comments.</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#05060f;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
    }
    .card {
      width:1080px;
      height:1080px;
      background:#05060f;
      padding:70px 80px 50px 80px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    
    /* Background effects */
    .grid-bg {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 1;
    }
    .glow-radial {
      position:absolute;
      width:900px;
      height:900px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(5,6,15,0) 70%);
      filter:blur(80px);
      z-index: 2;
    }
    .glow-top-right { top:-250px; right:-250px; }
    .glow-bottom-left { bottom:-350px; left:-350px; }

    /* Top Branding Header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      width: 100%;
    }
    .brand-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-logo {
      width: 46px;
      height: 46px;
    }
    .brand-name {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    .category-tag {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.25);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #60a5fa;
      box-shadow: 0 0 15px rgba(59,130,246,0.15);
    }

    /* Main Content Area */
    .main-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      z-index: 10;
      flex-grow: 1;
      justify-content: center;
      width: 100%;
      margin-top: 10px;
    }
    
    .headline-container {
      text-align: center;
      max-width: 860px;
    }
    .headline-container h1 {
      font-size: 3.4rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    .headline-container h1 span {
      background: linear-gradient(135deg, #ffffff 40%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Hero Mockup Window */
    .hero-mockup-window {
      width: 860px;
      background: #090d1a;
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 20px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.75), 0 0 50px rgba(59, 130, 246, 0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* Mockup window header bar (Mac-style) */
    .window-header {
      background: #0d1224;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      justify-content: space-between;
    }
    .window-dots {
      display: flex;
      gap: 8px;
    }
    .window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .window-dot.red { background: #ef4444; }
    .window-dot.yellow { background: #f59e0b; }
    .window-dot.green { background: #22c55e; }
    
    .window-address {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      height: 28px;
      width: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      font-family: monospace;
    }
    
    .window-actions {
      display: flex;
      gap: 12px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.9rem;
    }

    /* Mockup window client area */
    .window-content {
      padding: 40px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0d1224 0%, #090d1a 100%);
      min-height: 380px;
      position: relative;
    }

    /* Widget wrapper inside window */
    .widget-wrapper {
      width: 500px;
      position: relative;
      z-index: 5;
    }

    /* Annotations/Floating Badges */
    .floating-badge {
      position: absolute;
      background: rgba(12, 16, 32, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 14px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(59, 130, 246, 0.12);
      z-index: 10;
      animation: float 6s ease-in-out infinite;
    }
    
    .floating-badge.badge-left {
      left: 20px;
      top: 60px;
      animation-delay: 0s;
    }
    .floating-badge.badge-right {
      right: 20px;
      bottom: 60px;
      animation-delay: 3s;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    
    .badge-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #60a5fa;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .badge-text {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
    }

    /* Footer styling */
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #94a3b8;
      font-size: 1.1rem;
      font-weight: 700;
      z-index: 10;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 24px;
    }
    
    .footer-url {
      color: #60a5fa;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    
    .footer-cta {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="glow-radial glow-top-right"></div>
    <div class="glow-radial glow-bottom-left"></div>
    
    <!-- Header with Brand & Logo -->
    <div class="header-bar">
      <div class="brand-area">
        <svg class="brand-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(256 256) rotate(-45)">
            <rect x="-120" y="-16" width="240" height="32" rx="8" fill="#1f2937" />
            <rect x="-110" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
            <rect x="-150" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
            <rect x="-170" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
            <rect x="80" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
            <rect x="120" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
            <rect x="160" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
          </g>
        </svg>
        <span class="brand-name">Life Gym</span>
      </div>
      <div class="category-tag">COACH VAULT</div>
    </div>
    
    <!-- Main Content Area -->
    <div class="main-body">
      <div class="headline-container">
        <h1><span>Secure private notes comments.</span></h1>
      </div>
      
      <!-- Hero Mockup Window -->
      <div class="hero-mockup-window">
        <div class="window-header">
          <div class="window-dots">
            <div class="window-dot red"></div>
            <div class="window-dot yellow"></div>
            <div class="window-dot green"></div>
          </div>
          <div class="window-address">lifegym.io/portal/coach</div>
          <div class="window-actions">
            <span>⟳</span>
          </div>
        </div>
        
        <div class="window-content">
          <!-- Floating Annotations -->
          <div class="floating-badge badge-left">
            <div class="badge-icon">✓</div>
            <div class="badge-text">Visible only to coach ID</div>
          </div>
          
          <div class="floating-badge badge-right">
            <div class="badge-icon">✓</div>
            <div class="badge-text">Pinned to client profiles</div>
          </div>
          
          <!-- UI Widget Box -->
          <div class="widget-wrapper">
            
      <div style="background:#0c1020; border-radius:12px; padding:18px; border:1px solid rgba(59, 130, 246, 0.15); box-shadow:0 8px 20px rgba(0,0,0,0.4);">
        <div style="color:#fff; font-weight:700; font-size:0.9rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:6px; margin-bottom:8px;">Private Coach Comments</div>
        <p style="color:#9ca3af; font-size:0.75rem; line-height:1.4;">"Knee fatigue reported during heavy squats. Swapped back squats to quad-focused leg presses."</p>
      </div>
    
          </div>
        </div>
      </div>
    </div>
    
    <!-- Footer CTA -->
    <div class="footer-bar">
      <div class="footer-url">@lifegym.io</div>
      <div class="footer-cta">Link in Bio →</div>
    </div>
  </div>
</body>
</html>
