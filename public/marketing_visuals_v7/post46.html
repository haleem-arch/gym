<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup ${config.id} - ${config.title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#05060f;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
      color: #fff;
    }
    
    .glow-radial {
      position:absolute;
      width:900px;
      height:900px;
      border-radius:50%;
      filter:blur(120px);
      z-index: 2;
      pointer-events: none;
    }
    .glow-top-right { top:-250px; right:-250px; }
    .glow-bottom-left { bottom:-350px; left:-350px; }
    .glow-center { top:50%; left:50%; transform:translate(-50%, -50%); }
    .glow-top-center { top:-350px; left:50%; transform:translateX(-50%); }
    .glow-left { top:50%; left:-350px; transform:translateY(-50%); }
    .glow-right { top:50%; right:-350px; transform:translateY(-50%); }

    /* 1. Twitter Post Style */
    .x-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
    }
    .x-post-card {
      width: 820px;
      background: #000000;
      border: 1px solid #2f3336;
      border-radius: 20px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
      z-index: 10;
    }
    .x-header {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
    }
    .x-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .x-avatar svg {
      width: 32px;
      height: 32px;
    }
    .x-user-info {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      text-align: left;
    }
    .x-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .x-display-name {
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
    }
    .x-verified-badge {
      color: #1d9bf0;
      font-size: 0.95rem;
    }
    .x-handle {
      font-size: 0.9rem;
      color: #71767b;
    }
    .x-more {
      color: #71767b;
      font-weight: bold;
      cursor: pointer;
    }
    .x-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }
    .x-text {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.4;
      color: #e7e9ea;
    }
    .x-subtext {
      font-size: 1.1rem;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .x-embed-media {
      margin-top: 10px;
      border: 1px solid #2f3336;
      border-radius: 16px;
      overflow: hidden;
      background: #0c1020;
      padding: 24px;
      box-shadow: inset 0 0 20px rgba(59,130,246,0.05);
    }
    .x-meta {
      font-size: 0.95rem;
      color: #71767b;
      padding-bottom: 5px;
    }
    .white-text {
      color: #fff;
      font-weight: bold;
    }
    .x-divider {
      height: 1px;
      background: #2f3336;
      width: 100%;
    }
    .x-stats {
      display: flex;
      gap: 24px;
      font-size: 0.95rem;
      color: #71767b;
    }
    .x-actions {
      display: flex;
      justify-content: space-between;
      color: #71767b;
      font-size: 1.05rem;
      padding: 0 10px;
    }
    
    /* 2. Browser Showcase Style */
    .browser-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: radial-gradient(circle at top right, rgba(59,130,246,0.08) 0%, #05060f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 70px;
      position: relative;
    }
    .browser-post-wrapper::before {
      content: '';
      position: absolute;
      top:0; left:0; right:0; bottom:0;
      background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 1;
    }
    .browser-window-card {
      width: 900px;
      background: #090d1a;
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 20px;
      box-shadow: 0 35px 80px rgba(0,0,0,0.8), 0 0 40px rgba(59,130,246,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }
    .browser-header {
      background: #0c1125;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      justify-content: space-between;
    }
    .browser-dots {
      display: flex;
      gap: 8px;
    }
    .b-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .b-dot.red { background: #ef4444; }
    .b-dot.yellow { background: #f59e0b; }
    .b-dot.green { background: #22c55e; }
    .browser-address-bar {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      height: 28px;
      width: 440px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 0.75rem;
      font-family: monospace;
      gap: 6px;
    }
    .browser-refresh {
      color: rgba(255,255,255,0.2);
      font-size: 0.95rem;
    }
    .browser-workspace {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: 540px;
    }
    .browser-sidebar {
      background: #080b18;
      border-right: 1px solid rgba(255,255,255,0.05);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: #fff;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .sidebar-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }
    .sidebar-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #94a3b8;
      cursor: pointer;
    }
    .sidebar-item.active {
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.15);
    }
    .browser-main-panel {
      padding: 30px;
      background: radial-gradient(circle at top, #0c1125 0%, #090d1a 100%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow: hidden;
      text-align: left;
    }
    .main-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 12px;
    }
    .main-panel-header h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
    }
    .panel-tag {
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      color: #60a5fa;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .panel-desc {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.4;
    }
    .panel-content-area {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    
    /* 3. Split Comparison Style */
    .comparison-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: #05060f;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .comp-col {
      padding: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
      height: 100%;
      position: relative;
      z-index: 5;
      text-align: left;
    }
    .left-col {
      background: #070914;
      border-right: 1px solid rgba(255,255,255,0.03);
    }
    .right-col {
      background: radial-gradient(circle at center, #0b1026 0%, #05060f 100%);
    }
    .comp-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .comp-badge {
      align-self: flex-start;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 6px;
    }
    .comp-badge.bad {
      background: rgba(239, 68, 68, 0.08);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .comp-badge.good {
      background: rgba(34, 197, 94, 0.08);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .comp-header h2 {
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
    }
    .comp-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .comp-list-item {
      font-size: 1rem;
      color: #64748b;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .comp-content-widget {
      width: 100%;
      background: rgba(12, 16, 32, 0.6);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .comp-list-good {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .comp-list-item-good {
      font-size: 0.95rem;
      color: #cbd5e1;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .comp-divider-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: #05060f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      box-shadow: 0 0 25px rgba(0,0,0,0.8), 0 0 15px rgba(59,130,246,0.15);
    }
    .comp-divider-logo svg {
      width: 44px;
      height: 44px;
    }
    .comp-glow-red {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.04) 0%, rgba(0,0,0,0) 70%);
      top: -50px; left: -50px;
      pointer-events: none;
    }
    
    /* 4. Phone Perspective Style */
    .phone-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: #05060f;
      display: grid;
      grid-template-columns: 460px 440px;
      gap: 40px;
      align-items: center;
      justify-content: center;
      padding: 70px;
      position: relative;
    }
    .phone-text-side {
      display: flex;
      flex-direction: column;
      gap: 24px;
      text-align: left;
      z-index: 10;
    }
    .category-tag-mini {
      align-self: flex-start;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,255,255,0.15);
      text-transform: uppercase;
    }
    .phone-title {
      font-size: 2.8rem;
      font-weight: 950;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffffff 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .phone-description {
      font-size: 1.1rem;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .phone-bullets-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .phone-bullet-row {
      font-size: 1rem;
      color: #cbd5e1;
      font-weight: 700;
    }
    .phone-mockup-container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    .phone-device-body {
      width: 320px;
      height: 620px;
      background: #000;
      border: 10px solid #1c233a;
      border-radius: 40px;
      position: relative;
      box-shadow: 0 35px 70px rgba(0,0,0,0.8), 0 0 50px rgba(59,130,246,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .phone-device-island {
      width: 90px;
      height: 18px;
      background: #000;
      border-radius: 9px;
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .phone-device-screen {
      flex-grow: 1;
      background: #05060f;
      display: flex;
      flex-direction: column;
      padding: 30px 14px 14px 14px;
    }
    .phone-device-header {
      height: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .phone-device-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* 5. Bold Typography Style */
    .typography-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: #05060f;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 100px;
      position: relative;
      overflow: hidden;
    }
    .typo-watermark {
      position: absolute;
      width: 600px;
      height: 600px;
      opacity: 0.02;
      z-index: 1;
      pointer-events: none;
    }
    .typo-content {
      z-index: 5;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      max-width: 880px;
    }
    .typo-tag {
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 10px;
    }
    .typo-headline {
      font-size: 4.8rem;
      font-weight: 950;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .typo-divider {
      width: 80px;
      height: 4px;
      border-radius: 2px;
    }
    .typo-subheadline {
      font-size: 1.4rem;
      color: #94a3b8;
      line-height: 1.6;
      font-weight: 500;
      max-width: 720px;
    }
    .typo-footer {
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #cbd5e1;
    }
    .typo-footer-logo {
      width: 24px;
      height: 24px;
    }
    
    /* 6. Bento Grid Style */
    .bento-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: #05060f;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 70px 80px;
      z-index: 5;
      position: relative;
    }
    .bento-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
    }
    .bento-tag-badge {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      border: 1px solid;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: inline-block;
    }
    .bento-main-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      text-align: left;
    }
    .bento-grid-container {
      display: grid;
      grid-template-columns: 500px 390px;
      grid-template-rows: 240px 240px;
      gap: 25px;
      flex-grow: 1;
    }
    .bento-grid-cell {
      background: #090d1a;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      text-align: left;
    }
    .cell-large {
      grid-row: span 2;
      background: radial-gradient(circle at top right, rgba(59,130,246,0.05) 0%, #090d1a 100%);
      border: 1px solid;
    }
    .cell-label {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .bento-grid-cell h3 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
    }
    .wa-status-pill {
      margin-top: 10px;
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.15);
      padding: 4px 10px;
      border-radius: 4px;
      align-self: flex-start;
    }
    
    /* 7. WhatsApp Alert Style */
    .wa-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: radial-gradient(circle at bottom left, rgba(34,197,94,0.08) 0%, #05060f 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px;
      position: relative;
    }
    .wa-headline-area {
      max-width: 820px;
      text-align: left;
    }
    .wa-main-title {
      font-size: 3rem;
      font-weight: 950;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffffff 50%, #22c55e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .wa-sub-title {
      font-size: 1.2rem;
      color: #cbd5e1;
      margin-top: 14px;
      line-height: 1.5;
    }
    .wa-notifications-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      margin: 40px 0;
    }
    .wa-card-notif {
      width: 100%;
      background: rgba(12, 16, 32, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: 16px;
      padding: 24px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(34,197,94,0.06);
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .wa-notif-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .wa-app-icon {
      font-size: 1rem;
    }
    .wa-app-name {
      font-size: 0.75rem;
      font-weight: 900;
      color: #cbd5e1;
      letter-spacing: 0.1em;
      flex-grow: 1;
    }
    .wa-time {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 700;
    }
    .wa-notif-body {
      font-size: 1rem;
      line-height: 1.4;
    }
    .wa-footer-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: #cbd5e1;
      font-size: 1.05rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 24px;
    }
    
    /* 8. Circular Adherence Style */
    .adherence-post-wrapper {
      width: 1080px;
      height: 1080px;
      background: #05060f;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px;
      position: relative;
    }
    .adherence-title {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1.25;
      text-align: center;
    }
    .adherence-center-view {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      margin: 40px 0;
    }
    .adherence-donut-container {
      width: 260px;
      height: 260px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .adherence-donut {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .adherence-donut-overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .donut-percentage {
      font-size: 3.5rem;
      font-weight: 950;
      color: #fff;
    }
    .donut-label {
      font-size: 0.75rem;
      font-weight: 800;
      color: #cbd5e1;
      letter-spacing: 0.1em;
    }
    .adherence-details-box {
      width: 420px;
      background: #0c1020;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .adherence-footer-text {
