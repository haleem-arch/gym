<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 8</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#05060f;
      width:1080px;
      height:1080px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Outfit', sans-serif;
      overflow:hidden;
      color: #fff;
    }
    .card {
      width:1080px;
      height:1080px;
      background:#05060f;
      padding:70px 80px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    
    .glow-radial {
      position:absolute;
      width:900px;
      height:900px;
      border-radius:50%;
      filter:blur(110px);
      z-index: 2;
      pointer-events: none;
    }
    .glow-top-right { top:-250px; right:-250px; }
    .glow-bottom-left { bottom:-350px; left:-350px; }
    .glow-center { top:50%; left:50%; transform:translate(-50%, -50%); }
    .glow-top-center { top:-350px; left:50%; transform:translateX(-50%); }
    .glow-left { top:50%; left:-350px; transform:translateY(-50%); }
    .glow-right { top:50%; right:-350px; transform:translateY(-50%); }

    /* Top Header Brand */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      width: 100%;
    }
    .brand-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      width: 42px;
      height: 42px;
    }
    .brand-name {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    .logo-badge {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #94a3b8;
    }

    /* Continuous Flow Swiping Lines */
    .flow-line {
      position: absolute;
      bottom: 150px;
      height: 4px;
      border-radius: 2px;
      z-index: 5;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      opacity: 0.6;
      box-shadow: 0 0 15px #22c55e80;
    }
    .flow-start { left: 400px; width: 680px; }
    .flow-mid { left: 0; width: 1080px; }
    .flow-end { left: 0; width: 680px; }

    /* 1. Slide Phone Layout */
    .slide-phone-layout {
      display: grid;
      grid-template-columns: 460px 420px;
      gap: 40px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      width: 100%;
      flex-grow: 1;
      margin: 30px 0;
    }
    .slide-text-side {
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: left;
    }
    .slide-badge {
      align-self: flex-start;
      font-size: 0.75rem;
      font-weight: 850;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid;
      text-transform: uppercase;
    }
    .slide-title {
      font-size: 2.8rem;
      font-weight: 950;
      line-height: 1.2;
      color: #fff;
    }
    .slide-desc {
      font-size: 1.05rem;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .slide-phone-mockup {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .phone-device {
      width: 320px;
      height: 580px;
      background: #000;
      border: 10px solid #1c233a;
      border-radius: 38px;
      position: relative;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 40px rgba(59,130,246,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .phone-island {
      width: 90px;
      height: 18px;
      background: #000;
      border-radius: 9px;
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .phone-screen {
      flex-grow: 1;
      background: #05060f;
      display: flex;
      flex-direction: column;
      padding: 30px 14px 14px 14px;
    }
    .phone-header {
      height: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #cbd5e1;
      margin-bottom: 16px;
    }
    .phone-body {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* 2. Slide Bold Text Layout */
    .slide-text-layout {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
      z-index: 10;
      width: 100%;
      flex-grow: 1;
      margin: 30px 0;
    }
    .slide-bigtext {
      font-size: 5rem;
      font-weight: 950;
      line-height: 1.1;
      text-align: center;
      letter-spacing: -0.02em;
    }
    .slide-divider {
      width: 80px;
      height: 4px;
      border-radius: 2px;
    }
    .slide-middle-box {
      text-align: center;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .slide-mid-title {
      font-size: 1.8rem;
      font-weight: 850;
      color: #fff;
    }
    .slide-mid-desc {
      font-size: 1.1rem;
      color: #cbd5e1;
      line-height: 1.5;
    }

    /* 3. Slide Chart Layout */
    .slide-chart-box {
      width: 720px;
      background: #090d1a;
      border: 1px solid;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.6);
    }

    /* 4. Slide Bento Grid Layout */
    .slide-bento-layout {
      display: grid;
      grid-template-columns: 440px 440px;
      gap: 40px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      width: 100%;
      flex-grow: 1;
      margin: 30px 0;
    }
    .slide-bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 20px;
      width: 440px;
    }
    .bento-card {
      background: #090d1a;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }
    .card-top {
      grid-column: span 2;
    }
    .card-bottom-left {
      background: radial-gradient(circle at top left, rgba(34,197,94,0.04) 0%, #090d1a 100%);
    }
    .card-bottom-right {
      background: radial-gradient(circle at top left, rgba(59,130,246,0.04) 0%, #090d1a 100%);
    }
    .card-bottom-full {
      grid-column: span 2;
      background: radial-gradient(circle at center, rgba(59,130,246,0.03) 0%, #090d1a 100%);
    }

    /* Bottom Footer Bar */
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #94a3b8;
      font-size: 1.05rem;
      font-weight: 700;
      z-index: 10;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 24px;
    }
    .footer-url {
      color: #60a5fa;
      font-weight: 800;
    }
    .footer-swipe {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow-radial glow-left" style="background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, rgba(5,6,15,0) 70%);"></div><div class="glow-radial glow-right" style="background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, rgba(5,6,15,0) 70%);"></div>
    
    <!-- Top Header Brand -->
    <div class="header-bar">
      <div class="brand-area">
        <svg class="brand-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(256 256) rotate(-45)">
            <rect x="-120" y="-16" width="240" height="32" rx="8" fill="#1f2937" />
            <rect x="-110" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
            <rect x="-150" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
            <rect x="-170" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
            <rect x="80" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
            <rect x="120" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
            <rect x="160" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
          </g>
        </svg>
        <span class="brand-name">Life Gym</span>
      </div>
      <div class="logo-badge">CAROUSEL kit</div>
    </div>
    
    <!-- Layout Content -->
    
      <div class="slide-bento-layout">
        <div class="slide-text-side">
          <span class="slide-badge" style="border-color:#22c55e40; color:#22c55e; background:#22c55e0a;">ACCOUNTABILITY MECHANICS • SLIDE 3/5</span>
          <h2 class="slide-title">10-Second Micro-Inputs.</h2>
          <p class="slide-desc">Rather than filling out endless form inputs, clients tap quick preset modules to log water, macros, and workout sets.</p>
        </div>
        <div class="slide-bento-grid">
          <div class="bento-card card-top" style="border-color:#22c55e30;">
            
      <div style="background:#0c1020; border-radius:12px; padding:18px; border:1px solid rgba(255,255,255,0.05); box-shadow:0 8px 20px rgba(0,0,0,0.4); width: 100%; text-align:left;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <span style="font-size:0.75rem; color:#cbd5e1; font-weight:bold;">Water Target presets</span>
          <span>💧</span>
        </div>
        <div style="display:flex; gap:6px;">
          <button style="flex:1; background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.15); border-radius:6px; padding:8px 0; color:#60a5fa; font-weight:bold; font-size:0.75rem;">+0.25L</button>
          <button style="flex:1; background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.15); border-radius:6px; padding:8px 0; color:#60a5fa; font-weight:bold; font-size:0.75rem;">+0.50L</button>
        </div>
      </div>
    
          </div>
          <div class="bento-card card-bottom-left">
            <span style="font-size:0.6rem; font-weight:900; color:#22c55e;">BENEFIT</span>
            <h4 style="font-size:0.95rem; color:#fff; font-weight:800; margin-top:4px;">No spreadsheets</h4>
          </div>
          <div class="bento-card card-bottom-right">
            <span style="font-size:0.6rem; font-weight:900; color:#60a5fa;">SYNC</span>
            <h4 style="font-size:0.95rem; color:#fff; font-weight:800; margin-top:4px;">Auto WhatsApp</h4>
          </div>
        </div>
      </div>
    
    
    <!-- Swipe Continuous Flow Line -->
    <div class="flow-line flow-mid"></div>

    <!-- Bottom Footer -->
    <div class="footer-bar">
      <div class="footer-url">@lifegym.io</div>
      <div class="footer-swipe">Swipe Right →</div>
    </div>
  </div>
</body>
</html>
