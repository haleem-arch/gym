<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 10 - Water Log Compliance</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Bar Chart Widget */
    .bar-chart-panel { z-index:10; width: 420px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
    .bars-container { display:flex; justify-content:space-between; align-items:flex-end; height:150px; margin-top:25px; }
    .chart-bar-col { text-align:center; width:35px; }
    .chart-bar { width:100%; border-radius:6px; background:#1e293b; transition: height 0.5s ease; }
    .chart-bar.filled { background:#3b82f6; }
    .bar-day { font-size:0.8rem; color:#9ca3af; margin-top:8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Weekly client <span>water tracking.</span></h1>
      <p>Ensure hydration targets are met during heavy training splits. Track cumulative daily water compliance logs directly within the athlete metrics board.</p>
    </div>
    
    <div class="bar-chart-panel">
      <div style="color:#fff; font-weight:700; font-size:1.2rem;">Weekly Water Log (Liters)</div>
      <div class="bars-container">
        <div class="chart-bar-col">
          <div class="chart-bar filled" style="height:120px;"></div>
          <div class="bar-day">Mon</div>
        </div>
        <div class="chart-bar-col">
          <div class="chart-bar filled" style="height:140px;"></div>
          <div class="bar-day">Tue</div>
        </div>
        <div class="chart-bar-col">
          <div class="chart-bar" style="height:60px;"></div>
          <div class="bar-day">Wed</div>
        </div>
        <div class="chart-bar-col">
          <div class="chart-bar filled" style="height:110px;"></div>
          <div class="bar-day">Thu</div>
        </div>
        <div class="chart-bar-col">
          <div class="chart-bar filled" style="height:130px;"></div>
          <div class="bar-day">Fri</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
