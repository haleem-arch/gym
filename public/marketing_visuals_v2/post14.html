<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 14 - Weight Tracking Graph</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; align-items:center; justify-content:space-between; position:relative; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-left { bottom:-100px; left:-100px; }
    
    .info { max-width:440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }
    
    /* Weight Graph Widget */
    .weight-panel { z-index:10; width: 440px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
    .chart-container { height:180px; width:100%; border-bottom: 2px solid rgba(255,255,255,0.05); border-left: 2px solid rgba(255,255,255,0.05); position:relative; margin-top:20px; }
    .chart-svg { width:100%; height:100%; fill:none; stroke:#10b981; stroke-width:4; stroke-linecap:round; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-left"></div>
    <div class="info">
      <h1>Track daily <span>weight trends.</span></h1>
      <p>Help clients visualize their fat loss progress. The system plots morning weight averages automatically, helping you audit fat loss trends over time.</p>
    </div>
    
    <div class="weight-panel">
      <div>
        <div style="font-size:0.85rem; color:#9ca3af; text-transform:uppercase; letter-spacing:0.05em;">Client Weight Log</div>
        <div style="font-size:2rem; font-weight:900; color:#fff;">-6.4 kg <span style="font-size:1rem; color:#10b981; margin-left:8px;">Trend: Downward</span></div>
      </div>
      <div class="chart-container">
        <svg class="chart-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path d="M 0,20 Q 25,30 50,55 T 100,80" />
          <circle cx="100" cy="80" r="4" fill="#10b981" />
        </svg>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:15px; color:#9ca3af; font-size:0.8rem;">
        <div>Week 1</div>
        <div>Week 4</div>
        <div>Week 8</div>
      </div>
    </div>
  </div>
</body>
</html>
