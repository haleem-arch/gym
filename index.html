<!doctype html>
<html lang="en" style="background:#05060f">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Life Gym">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Life Gym is a premium fitness coaching and client management portal. Design custom workout splits, templates, and nutrition targets for your athletes with instant syncing." />
    <meta name="keywords" content="life gym, life coaching, fitness coaching, athlete tracker, personal trainer, workout templates, custom macro tracker, gym day macros" />
    <meta name="author" content="Life Gym Team" />
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Life Gym - Premium Fitness Coaching & Client Management Portal" />
    <meta property="og:description" content="Design custom workout splits, templates, and nutrition targets for your athletes with instant syncing." />
    <meta property="og:image" content="/icon.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Life Gym - Premium Fitness Coaching Platform" />
    <meta property="twitter:description" content="Design custom workout splits, templates, and nutrition targets for your athletes with instant syncing." />
    
    <title>Life Gym - Premium Fitness Coaching & Client Management Portal</title>
    
    <!-- Schema.org JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FitnessCenter",
      "name": "Life Gym",
      "description": "Life Gym is a premium fitness coaching and client management portal. Design custom workout splits, templates, and nutrition targets for your athletes with instant syncing.",
      "telephone": "01128828954",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Cairo",
        "addressCountry": "EG"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 30.0444,
        "longitude": 31.2357
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"
        ],
        "opens": "00:00",
        "closes": "23:59"
      }
    }
    </script>
    
    <!-- Schema.org FAQPage Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Life Gym?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Life Gym is a professional coaching management platform that lets you manage all your athletes in one place — their workouts, nutrition, body composition, hydration, and progress — while giving each athlete their own personal tracking portal."
          }
        },
        {
          "@type": "Question",
          "name": "How do I pay for my subscription?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can pay via mobile wallet (Vodafone Cash, etc.) or Telda app. After completing the transfer, you upload a screenshot receipt through the renewal portal and our team verifies it."
          }
        },
        {
          "@type": "Question",
          "name": "Does Life Gym work on iPhone and Android?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Life Gym is a web-based platform that works on any device through your browser — no app download required."
          }
        },
        {
          "@type": "Question",
          "name": "Can I set different nutrition targets for gym days and rest days?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You can set completely separate macro targets for each day type — gym days, rest days, run days, or any custom day type you create."
          }
        }
      ]
    }
    </script>
  </head>
  <body style="background:#05060f;margin:0;padding:0">
    <div id="root">
      <!-- Loading layout on boot -->
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #05060f; color: #ffffff; font-family: sans-serif;">
        <svg viewBox="0 0 512 512" style="width: 72px; height: 72px; animation: pulse-scale 1.8s ease-in-out infinite;">
          <g transform="translate(256 256) rotate(-45)">
            <rect x="-120" y="-16" width="240" height="32" rx="8" fill="#1f2937" />
            <rect x="-110" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
            <rect x="-150" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
            <rect x="-170" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
            <rect x="80" y="-60" width="30" height="120" rx="8" fill="#3b82f6" />
            <rect x="120" y="-80" width="30" height="160" rx="10" fill="#3b82f6" />
            <rect x="160" y="-40" width="10" height="80" rx="4" fill="#60a5fa" />
          </g>
        </svg>
        <style>
          @keyframes pulse-scale {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
