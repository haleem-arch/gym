<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 17 - Egyptian Food Database</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Food UI Mockup */
    .food-card { z-index:10; width: 400px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; }
    .food-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:15px; margin-bottom:20px; }
    .food-title { color:#fff; font-weight:900; font-size:1.3rem; }
    .food-arabic { color:#9ca3af; font-size:1.1rem; margin-top:5px; font-family:sans-serif; }
    .macro-row { display:flex; justify-content:space-between; margin-bottom:12px; font-size:1.05rem; }
    .macro-val { font-weight:700; color:#fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>1,000+ local <span>Egyptian foods.</span></h1>
      <p>No more translating white rice varieties or Egyptian bread labels. Search local foods by their actual Arabic names with precise macro splits.</p>
    </div>
    
    <div class="food-card">
      <div class="food-header">
        <div class="food-title">Baladi Bread</div>
        <div class="food-arabic">عيش بلدي (100g)</div>
      </div>
      <div class="macro-row"><span>Calories</span> <span class="macro-val">275 kcal</span></div>
      <div class="macro-row"><span>Protein</span> <span class="macro-val" style="color:#10b981;">9.5g</span></div>
      <div class="macro-row"><span>Carbs</span> <span class="macro-val" style="color:#3b82f6;">55g</span></div>
      <div class="macro-row"><span>Fat</span> <span class="macro-val" style="color:#ef4444;">1.5g</span></div>
    </div>
  </div>
</body>
</html>
