<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 24 - Plate Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Barbell Stack Mockup */
    .bar-stack { z-index:10; width: 400px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; text-align:center; }
    .bar-display { display:flex; align-items:center; justify-content:center; gap:5px; margin:30px 0; }
    .barbell-rod { width:100px; height:8px; background:#4b5563; }
    .plate { height:120px; border-radius:6px; font-weight:700; color:#fff; display:flex; align-items:center; justify-content:center; font-size:0.8rem; }
    .plate.p20 { width:24px; background:#ef4444; }
    .plate.p15 { width:20px; height:100px; background:#3b82f6; }
    .plate.p10 { width:16px; height:80px; background:#10b981; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Instant barbell <br><span>plate calculations.</span></h1>
      <p>Subtracts the 20kg bar weight dynamically and shows the exact plates configuration needed on each side of the bar.</p>
    </div>
    
    <div class="bar-stack">
      <div style="color:#fff; font-weight:700; font-size:1.1rem;">Lifting Target: 110 kg</div>
      <div class="bar-display">
        <div class="plate p20">20</div>
        <div class="plate p15">15</div>
        <div class="plate p10">10</div>
        <div class="barbell-rod"></div>
        <div class="plate p10">10</div>
        <div class="plate p15">15</div>
        <div class="plate p20">20</div>
      </div>
      <div style="color:#3b82f6; font-weight:700; font-size:0.95rem;">Plates Per Side: 20kg + 15kg + 10kg</div>
    </div>
  </div>
</body>
</html>
