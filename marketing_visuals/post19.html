<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 19 - Anti-Ban Config</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(16,185,129,0.15) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#10b981; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Slider UI Mockup */
    .slider-box { z-index:10; width: 420px; border-radius: 24px; border: 1px solid rgba(16,185,129,0.3); background:rgba(16,185,129,0.02); padding:35px; }
    .slider-title { color:#fff; font-weight:900; font-size:1.2rem; margin-bottom:25px; }
    .control-row { margin-bottom:22px; }
    .control-label { display:flex; justify-content:space-between; color:#9ca3af; font-size:0.9rem; margin-bottom:10px; }
    .slider-bar { width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:4px; position:relative; }
    .slider-fill { height:100%; background:#10b981; border-radius:4px; width:70%; }
    .slider-handle { position:absolute; top:-6px; left:70%; width:20px; height:20px; border-radius:50%; background:#fff; border:4px solid #10b981; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Anti-ban security <span>safeguards.</span></h1>
      <p>Configure random delay intervals and automated warm-up scripts to safeguard your WhatsApp account while broadcasting alerts.</p>
    </div>
    
    <div class="slider-box">
      <div class="slider-title">Safeguards Config</div>
      <div class="control-row">
        <div class="control-label"><span>Queue Throttling Delay</span> <span>10s</span></div>
        <div class="slider-bar">
          <div class="slider-fill"></div>
          <div class="slider-handle"></div>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; color:#fff; font-size:1rem; font-weight:700;">
        <span>Warm-Up Interval</span>
        <span style="color:#10b981;">Every 10 texts</span>
      </div>
    </div>
  </div>
</body>
</html>
