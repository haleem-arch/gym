<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 23 - Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
    
    .info { max-width:800px; text-align:center; margin:0 auto; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; }
    .info h1 span { color:#3b82f6; }
    
    /* Leaderboard Mockup */
    .leaderboard { width: 500px; border-radius:24px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:35px; margin:auto; }
    .lead-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.03); padding-bottom:10px; }
    .lead-row:last-child { border:none; margin-bottom:0; padding-bottom:0; }
    .lead-user { display:flex; align-items:center; gap:12px; }
    .lead-rank { font-weight:900; color:#3b82f6; width:25px; }
    .lead-name { color:#fff; font-weight:700; }
    .lead-score { color:#10b981; font-weight:700; }
    
    .footer { display:flex; justify-content:space-between; color:#9ca3af; font-size:1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Host community <span>gym challenges.</span></h1>
    </div>
    
    <div class="leaderboard">
      <div class="lead-row">
        <div class="lead-user">
          <span class="lead-rank">#1</span>
          <span class="lead-name">Ahmed S.</span>
        </div>
        <span class="lead-score">12k kg lifted</span>
      </div>
      <div class="lead-row">
        <div class="lead-user">
          <span class="lead-rank">#2</span>
          <span class="lead-name">Mohamed A.</span>
        </div>
        <span class="lead-score">10.5k kg lifted</span>
      </div>
      <div class="lead-row">
        <div class="lead-user">
          <span class="lead-rank">#3</span>
          <span class="lead-name">Sherif K.</span>
        </div>
        <span class="lead-score">9.8k kg lifted</span>
      </div>
    </div>
    
    <div class="footer">
      <div>@lifegym.io</div>
      <div>Link in Bio →</div>
    </div>
  </div>
</body>
</html>
