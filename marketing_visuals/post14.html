<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 14 - Time stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    
    .info { max-width: 440px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#ef4444; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* Chart UI Mockup */
    .bar-chart { z-index:10; width: 440px; border-radius:24px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.01); padding:40px; }
    .chart-title { color:#fff; font-weight:900; font-size:1.2rem; margin-bottom:30px; }
    .bar-row { margin-bottom:25px; }
    .bar-label { display:flex; justify-content:space-between; color:#9ca3af; font-size:0.95rem; margin-bottom:8px; }
    .bar-track { width:100%; height:12px; background:rgba(255,255,255,0.05); border-radius:6px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:6px; }
    .bar-fill.red { background:#ef4444; width:80%; }
    .bar-fill.blue { background:#3b82f6; width:20%; }
  </style>
</head>
<body>
  <div class="card">
    <div class="info">
      <h1>Slash your <span>admin time by 80%.</span></h1>
      <p>Spend your time on coaching and athletic program design, not copy-pasting numbers. Automate client targets and dashboard analytics.</p>
    </div>
    
    <div class="bar-chart">
      <div class="chart-title">Weekly Admin Hours Spent</div>
      <div class="bar-row">
        <div class="bar-label"><span>Manual Sheets (WhatsApp)</span> <span>25 hrs</span></div>
        <div class="bar-track"><div class="bar-fill red"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>Life Gym Console</span> <span>5 hrs</span></div>
        <div class="bar-track"><div class="bar-fill blue"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
