<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup 1 - iPhone Portal App</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05060f; width:1080px; height:1080px; display:flex; justify-content:center; align-items:center; font-family:'Outfit', sans-serif; overflow:hidden; }
    .card { width:1080px; height:1080px; background:#060713; border:1px solid #1a203c; padding:80px; display:flex; position:relative; overflow:hidden; align-items:center; justify-content:space-between; }
    .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(6,7,19,0) 70%); filter:blur(40px); }
    .glow-right { top:-100px; right:-100px; }
    
    .info { max-width: 420px; z-index:10; }
    .info h1 { font-size:3.5rem; font-weight:900; color:#fff; line-height:1.2; margin-bottom:25px; }
    .info h1 span { color:#3b82f6; }
    .info p { font-size:1.4rem; color:#9ca3af; line-height:1.6; }

    /* iPhone CSS Mockup */
    .phone-container { z-index:10; width: 380px; height: 760px; border: 12px solid #1e293b; border-radius: 48px; background: #0b0f19; box-shadow: 0 25px 50px rgba(0,0,0,0.8); padding: 15px; position: relative; }
    .phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 140px; height: 25px; background: #1e293b; border-radius: 15px; z-index:20; }
    .phone-screen { width: 100%; height: 100%; border-radius: 32px; background: #060713; padding: 25px 15px; display: flex; flex-direction: column; justify-content: space-between; overflow:hidden; }
    .app-header { display: flex; justify-content: space-between; align-items: center; margin-top:10px; }
    .app-logo { font-size: 1.1rem; font-weight:900; color:#fff; }
    .app-logo span { color:#3b82f6; }
    .app-ring-box { border: 1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; text-align:center; margin: auto 0; }
    .ring-svg { width: 150px; height: 150px; margin: 0 auto 15px; }
    .app-footer { border-top: 1px solid rgba(255,255,255,0.05); padding-top:15px; text-align:center; color:#9ca3af; font-size:0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow glow-right"></div>
    <div class="info">
      <h1>Your App. <br>In their <span>pocket.</span></h1>
      <p>Give your athletes a high-end PWA mobile tracking experience. Instantly log water, macros, and sets on the go.</p>
    </div>
    <div class="phone-container">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="app-header">
          <div class="app-logo">LIFE<span>GYM</span></div>
          <div style="background:rgba(59,130,246,0.1); color:#3b82f6; font-size:0.7rem; font-weight:700; padding:4px 8px; border-radius:10px;">CLIENT</div>
        </div>
        <div class="app-ring-box">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <!-- Simulated status rings -->
            <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="8" />
            <circle cx="50" cy="50" r="40" fill="none" stroke="#3b82f6" stroke-width="8" stroke-dasharray="180 250" stroke-linecap="round" />
            <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="8" />
            <circle cx="50" cy="50" r="30" fill="none" stroke="#10b981" stroke-width="8" stroke-dasharray="120 200" stroke-linecap="round" />
          </svg>
          <div style="color:#fff; font-size:1.1rem; font-weight:700;">85% Logged</div>
          <div style="color:#9ca3af; font-size:0.8rem; mt:5px;">Daily Target Status</div>
        </div>
        <div class="app-footer">@lifegym.io</div>
      </div>
    </div>
  </div>
</body>
</html>
